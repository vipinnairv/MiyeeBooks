// ============================================================================
// PARTIES (Customers & Vendors)
// ============================================================================
function Parties({data, setData, showToast, readOnly=false}){
  const [editing, setEditing] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');

  const filtered = data.parties.filter(p => {
    if(filter !== 'All' && p.type !== filter) return false;
    if(search && !p.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const handleSave = (party) => {
    if(editing){
      setData({...data, parties: data.parties.map(p => p.id === editing.id ? {...party, id:editing.id} : p)});
      showToast('Party updated');
    } else {
      setData({...data, parties: [...data.parties, {...party, id:uid()}]});
      showToast('Party added');
    }
    setShowModal(false);
    setEditing(null);
  };

  const handleDelete = (party) => {
    if(!confirm('Delete "' + party.name + '"?')) return;
    setData({...data, parties: data.parties.filter(p => p.id !== party.id)});
    showToast('Party deleted');
  };

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Customers & Vendors</h1>
          <div className="page-sub">{data.parties.length} parties · GSTIN-validated master</div>
        </div>
        {!readOnly && <div className="page-actions">
          <button className="btn btn-primary" onClick={() => { setEditing(null); setShowModal(true); }}>+ New Party</button>
        </div>}
      </div>

      <div className="filter-bar">
        <div className="field"><label>Search</label><input value={search} onChange={e => setSearch(e.target.value)} placeholder="Name or GSTIN..." style={{minWidth:240}} /></div>
        <div className="field"><label>Type</label>
          <select value={filter} onChange={e => setFilter(e.target.value)}>
            <option>All</option><option>Customer</option><option>Vendor</option>
          </select>
        </div>
      </div>

      <div className="table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Type</th><th>GSTIN</th><th>PAN</th><th>State</th><th>Credit Days</th><th>Contact</th><th className="num">Balance</th><th></th></tr>
          </thead>
          <tbody>
            {filtered.map(p => (
              <tr key={p.id}>
                <td>
                  <b>{p.name}</b>
                  {p.isForeign && <span className="badge badge-gold" style={{marginLeft:6}}>Foreign</span>}
                  {p.unregistered && <span className="badge badge-muted" style={{marginLeft:6}}>URD</span>}
                  {p.msmeReg && <span className="badge badge-info" style={{marginLeft:6}}>MSME</span>}
                  {p.tdsApplicableDefault && <span className="badge badge-gold" style={{marginLeft:6}}>TDS</span>}
                  {p.contactPerson && <div style={{fontSize:10, color:'var(--ink-3)', marginTop:1}}>{p.contactPerson}</div>}
                </td>
                <td><span className={'badge ' + (p.type==='Customer'?'badge-info':'badge-gold')}>{p.type}</span></td>
                <td style={{fontFamily:'var(--mono)', fontSize:11}}>{p.gstin || <span style={{color:'var(--ink-3)', fontStyle:'italic'}}>URD</span>}</td>
                <td style={{fontFamily:'var(--mono)', fontSize:11, color: p.pan ? 'var(--ink)' : 'var(--danger)'}}>{p.pan || '—'}</td>
                <td>{p.state}{p.stateCode && <span style={{fontSize:10, color:'var(--ink-3)'}}> ({p.stateCode})</span>}</td>
                <td style={{textAlign:'center'}}>{p.creditDays||30}d{p.creditLimit>0 && <div style={{fontSize:10, color:'var(--ink-3)'}}>Limit: ₹{fmt(p.creditLimit)}</div>}</td>
                <td style={{fontSize:11, color:'var(--ink-3)'}}>{p.email && <div>{p.email}</div>}{p.phone && <div>{p.phone}</div>}</td>
                <td className="num bold">{p.currency==='INR'||!p.currency?'₹':p.currency+' '}{fmt(p.balance||0)}</td>
                <td className="actions">
                  {!readOnly && <button className="btn btn-sm btn-ghost" onClick={() => { setEditing(p); setShowModal(true); }}>Edit</button>}
                  {!readOnly && <button className="btn btn-sm btn-danger" onClick={() => handleDelete(p)}>×</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showModal && <PartyModal party={editing} onSave={handleSave} onClose={() => { setShowModal(false); setEditing(null); }} />}
    </>
  );
}

                <option>Customer</option><option>Vendor</option>

            </div>
            <div className="field"><label>Contact Person</label><input value={f.contactPerson||''} onChange={e => setF({...f, contactPerson:e.target.value})} placeholder="Mr. / Ms." /></div>
            <div className="field"><label>Currency</label>

function CompanySettings({data, setData, showToast, readOnly=false}){
  const [f, setF] = useState(data.company);
  const logoRef = useRef(null);

  const save = () => {
    setData({...data, company:f});
    showToast('Company settings saved');
  };
  const resetData = () => {
    if(!confirm('Reset ALL data? This cannot be undone.')) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  };

  const handleLogoUpload = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(!file.type.match(/^image\/(png|jpeg|jpg|svg\+xml|webp)$/)){
      showToast('Please upload PNG, JPG, SVG or WebP image', 'error');
      return;
    }
    if(file.size > 500 * 1024){
      showToast('Logo file too large — max 500 KB', 'error');
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      setF({...f, logo: ev.target.result});
      showToast('Logo uploaded — click Save Settings to apply');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  const removeLogo = () => {
    setF({...f, logo: null});
    showToast('Logo removed — click Save Settings to apply');
  };

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Company Settings</h1>
          <div className="page-sub">Entity profile · Financial year · Tax registrations · Logo</div>

      </div>

                </div>
              ) : (
                <div style={{width:150, height:80, border:'2px dashed var(--line-2)', borderRadius:8, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'var(--ink-3)', fontSize:11}} onClick={() => logoRef.current?.click()}>
                  <span style={{fontSize:24, opacity:.3, marginBottom:4}}>⊞</span>
                  <span>Upload Logo</span>
                </div>

              <p style={{fontSize:12, color:'var(--ink-2)', margin:'0 0 8px 0'}}>Upload your company logo (PNG, JPG, SVG, or WebP). This logo will appear on:</p>

                <span className="chip">GST Tax Invoices</span>
                <span className="chip">Credit Notes</span>

              <p style={{fontSize:11, color:'var(--ink-3)', margin:'8px 0 0 0'}}>Max 500 KB · Recommended: transparent PNG, min 200×60px · Stored as base64 in your data</p>

function Vouchers({data, setData, showToast, readOnly=false}){
  const [editing, setEditing] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [vtype, setVtype] = useState('JV');
  const [filter, setFilter] = useState('All');

  const VCHR_SAMPLE_HEADERS = ['date','type','partyName','narration','reference','debitAccount','creditAccount','amount','gstRate','tdsSection'];
  const VCHR_SAMPLE_ROWS = [
    {date:'2025-04-01',type:'PAY',partyName:'Office Landlord — Mr. Patel',narration:'Office Rent April',reference:'APR-RENT',debitAccount:'4500',creditAccount:'2510',amount:'50000',gstRate:'18',tdsSection:''},
    {date:'2025-04-02',type:'REC',partyName:'Reliance Industries Ltd',narration:'Receipt against Invoice',reference:'INV-001',debitAccount:'2510',creditAccount:'2400',amount:'120000',gstRate:'',tdsSection:''},
    {date:'2025-04-05',type:'JV',partyName:'',narration:'Depreciation Q1 FY2025-26',reference:'DEP-Q1',debitAccount:'4400',creditAccount:'2130',amount:'25000',gstRate:'',tdsSection:''},
    {date:'2025-04-10',type:'PAY',partyName:'Reliance Jio (Telecom)',narration:'Internet Bill March',reference:'JIO-APR',debitAccount:'4520',creditAccount:'2510',amount:'4000',gstRate:'18',tdsSection:'394(6)'},
  ];

  const handleImportVouchers = (rows) => {
    const validTypes = VOUCHER_TYPES.map(v => v.code);
    const imported = [];
    const errors   = [];
    rows.forEach((r, i) => {
      const date   = r['date']?.trim();
      const type   = r['type']?.trim().toUpperCase();
      const amount = parseFloat(r['amount']);
      const drAcc  = r['debitAccount']?.trim();
      const crAcc  = r['creditAccount']?.trim();
      if(!date || !type || !amount || !drAcc || !crAcc){
        errors.push(`Row ${i+2}: date, type, debitAccount, creditAccount and amount are required`); return;
      }
      if(!validTypes.includes(type)){ errors.push(`Row ${i+2}: invalid type "${type}"`); return; }
      if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){ errors.push(`Row ${i+2}: date must be YYYY-MM-DD`); return; }
      const gstRate = parseFloat(r['gstRate']) || 0;
      const lines = [
        { id:uid(), accountId:drAcc, debit:amount, credit:0, narration:r['narration']||'' },
        { id:uid(), accountId:crAcc, debit:0, credit:amount, narration:r['narration']||'' },
      ];
      // Add GST lines for tax vouchers if gstRate given
      if(gstRate > 0 && ['SAL','PUR'].includes(type)){
        const taxAmt = Math.round(amount * gstRate / 100 * 100) / 100;
        if(['SAL'].includes(type)){
          lines.push({id:uid(), accountId:'2400', debit:taxAmt, credit:0, narration:'GST'});
          lines.push({id:uid(), accountId:'1312', debit:0, credit:taxAmt, narration:'IGST Output'});
        } else {
          lines.push({id:uid(), accountId:'2602', debit:taxAmt, credit:0, narration:'IGST Input'});
          lines.push({id:uid(), accountId:'1300', debit:0, credit:taxAmt, narration:'GST'});
        }
      }
      imported.push({
        id: uid(), type, date, number:'', partyName:r['partyName']||'', narration:r['narration']||'',
        reference:r['reference']||'', amount, lines, status:'Posted',
        createdAt: new Date().toISOString(),
      });
    });
    if(errors.length > 0 && imported.length === 0) return { count:0, error: errors.slice(0,3).join('; ') };
    setData(prev => {
      const numbered = imported.map(v => {
        const typeCount = [...prev.vouchers, ...imported.filter(x => x !== v)].filter(x => x.type === v.type).length;
        return { ...v, number: v.type + '/' + (typeCount+1).toString().padStart(4,'0') };
      });
      return {...prev, vouchers: [...prev.vouchers, ...numbered]};
    });
    showToast('Imported ' + imported.length + ' vouchers' + (errors.length?' ('+errors.length+' skipped)':''));
    return { count: imported.length };
  };

  const filteredVouchers = data.vouchers.filter(v => filter==='All' || v.type === filter)
    .sort((a,b) => b.date.localeCompare(a.date));

  const openNew = (type) => {
    setVtype(type);
    setEditing(null);
    setShowModal(true);
  };

  const handleSave = (v) => {
    if(editing){
      setData(prev => ({...prev, vouchers: prev.vouchers.map(x => x.id === editing.id ? {...v, id:editing.id} : x)}));
      showToast('Voucher updated: ' + v.number);
    } else {
      setData(prev => {
        const typeVouchers = prev.vouchers.filter(x => x.type === v.type);
        const num = v.type + '/' + (typeVouchers.length + 1).toString().padStart(4,'0');
        return {...prev, vouchers: [...prev.vouchers, {...v, id:uid(), number:v.number||num, createdAt:new Date().toISOString()}]};
      });
      showToast('Voucher posted: ' + (v.number || v.type));
    }
    setShowModal(false);
    setEditing(null);
  };

  const handleDelete = (v) => {
    if(!confirm('Cancel voucher ' + v.number + '?')) return;
    setData({...data, vouchers: data.vouchers.map(x => x.id === v.id ? {...x, status:'Cancelled'} : x)});
    showToast('Voucher cancelled');
  };

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Vouchers</h1>
          <div className="page-sub">Double-entry posting · GST-aware · {data.vouchers.length} entries</div>
        </div>
        {!readOnly && <div className="page-actions">
          <button className="btn" onClick={() => setShowImport(true)}>⬆ Bulk Import CSV</button>
        </div>}
      </div>

      {readOnly && <div style={{background:'#fff8e1',border:'1px solid #ffe082',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:12,color:'#5d4037'}}>
        👁 <b>Viewer / Auditor mode</b> — you can view all entries but cannot create, edit or cancel vouchers.
      </div>}

      {!readOnly && <div className="voucher-types">
        {VOUCHER_TYPES.map(vt => (
          <button key={vt.code} className="vt-btn" onClick={() => openNew(vt.code)}>
            <div className="vt-icon">{vt.icon}</div>
            <div className="vt-name">{vt.name}</div>
            <div className="vt-desc">{vt.desc}</div>
          </button>
        ))}
      </div>}

      <div className="filter-bar">
        <div className="field"><label>Filter by Type</label>
          <select value={filter} onChange={e => setFilter(e.target.value)}>
            <option>All</option>
            {VOUCHER_TYPES.map(vt => <option key={vt.code} value={vt.code}>{vt.name} ({vt.code})</option>)}
          </select>
        </div>
      </div>

      <div className="table-wrap">
        <table>
          <thead>
            <tr><th style={{width:90}}>Date</th><th>Voucher No.</th><th>Type</th><th>Party / Ref</th><th>Narration</th><th className="num">Amount</th><th>Status</th><th></th></tr>
          </thead>
          <tbody>
            {filteredVouchers.length === 0 ? (
              <tr><td colSpan="8"><div className="empty"><div className="empty-ico">∅</div><div>No vouchers yet — pick a type above to start.</div></div></td></tr>
            ) : filteredVouchers.map(v => (
              <tr key={v.id} style={{opacity:v.status==='Cancelled'?.5:1}}>
                <td>{v.date}</td>
                <td style={{fontFamily:'var(--mono)', fontWeight:600}}>{v.number}</td>
                <td><span className="badge badge-info">{v.type}</span></td>
                <td>{v.partyName || '—'}</td>
                <td style={{maxWidth:280, fontSize:12, color:'var(--ink-2)'}}>{v.narration || '—'}</td>
                <td className="num bold">₹{fmt(v.amount||0)}</td>
                <td><span className={'badge ' + (v.status==='Cancelled'?'badge-danger':'badge-success')}>{v.status||'Posted'}</span></td>
                <td className="actions">
                  {!readOnly && <button className="btn btn-sm btn-ghost" onClick={() => { setEditing(v); setVtype(v.type); setShowModal(true); }}>{v.status==='Cancelled'?'View':'Edit'}</button>}
                  {['SAL','PUR','CRN','DBN'].includes(v.type) && v.status!=='Cancelled' && <button className="btn btn-sm btn-ghost" style={{color:'var(--primary)'}} onClick={() => generateInvoicePDF(v, data)}>⎙ PDF</button>}
                  {!readOnly && v.status!=='Cancelled' && <button className="btn btn-sm btn-danger" onClick={() => handleDelete(v)}>×</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showModal && <VoucherModal vtype={vtype} voucher={editing} data={data} onSave={handleSave} onClose={() => { setShowModal(false); setEditing(null); }} showToast={showToast} />}
      {showImport && <CsvImportModal title="Bulk Import Vouchers" sampleHeaders={VCHR_SAMPLE_HEADERS} sampleRows={VCHR_SAMPLE_ROWS} sampleFilename="vouchers_import_template.csv" onImport={handleImportVouchers} onClose={() => setShowImport(false)} />}
    </>
  );
}

// ============================================================================
// SEARCHABLE SELECT — typeahead for account/party pickers
// ============================================================================
function SearchableSelect({options, value, onChange, placeholder, style}){
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const selected = options.find(o => o.value === value);

  useEffect(() => {
    const handler = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = options.filter(o => !query || o.label.toLowerCase().includes(query.toLowerCase())).slice(0, 40);

  return (
    <div ref={ref} style={{position:'relative', ...style}}>
      <div style={{display:'flex', border:'1px solid var(--line-2)', borderRadius:'var(--radius-sm)', background:'var(--surface)', overflow:'hidden'}}>
        <input
          value={open ? query : (selected ? selected.label : '')}
          onChange={e => { setQuery(e.target.value); setOpen(true); if(!e.target.value) onChange(''); }}
          onFocus={() => { setQuery(''); setOpen(true); }}
          placeholder={placeholder || '— Search or select —'}
          style={{flex:1, padding:'6px 8px', border:'none', outline:'none', fontSize:12, background:'transparent'}}
        />
        <span style={{padding:'0 8px', display:'flex', alignItems:'center', color:'var(--ink-3)', fontSize:10, cursor:'pointer', userSelect:'none'}} onClick={() => setOpen(!open)}>▾</span>
      </div>
      {open && (
        <div style={{position:'absolute', top:'100%', left:0, right:0, zIndex:200, background:'var(--surface)', border:'1px solid var(--line-2)', borderRadius:'var(--radius-sm)', boxShadow:'var(--shadow)', maxHeight:220, overflowY:'auto'}}>
          {filtered.length === 0 && <div style={{padding:'8px 12px', fontSize:11, color:'var(--ink-3)'}}>No results for "{query}"</div>}
          {filtered.map(o => (
            <div key={o.value} onClick={() => { onChange(o.value); setQuery(''); setOpen(false); }}
              style={{padding:'6px 12px', fontSize:11.5, cursor:'pointer', background: o.value===value ? 'var(--primary-soft)' : 'transparent', color: o.value===value ? 'var(--primary)' : 'var(--ink-2)'}}
              onMouseEnter={e => e.currentTarget.style.background='var(--surface-2)'}
              onMouseLeave={e => e.currentTarget.style.background = o.value===value ? 'var(--primary-soft)' : 'transparent'}>
              {o.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function VoucherModal({vtype, voucher, data, onSave, onClose, showToast}){
  const vt = VOUCHER_TYPES.find(x => x.code === vtype);
  const [f, setF] = useState(voucher || {
    type: vtype,
    date: today(),
    number: '',
    partyId: '',
    partyName: '',
    narration: '',
    reference: '',
    currency: 'INR',
    fxRate: 1,
    placeOfSupply: data.company.stateCode,
    lines: [
      {id:uid(), accountId:'', debit:0, credit:0, narration:''},
      {id:uid(), accountId:'', debit:0, credit:0, narration:''},
    ],
    items: [],  // For sales/purchase: itemized lines
    amount: 0,
    status: 'Posted',
  });

  const isGstVoucher = ['SAL','PUR','CRN','DBN'].includes(vtype);
  const isCashType = ['PAY','REC','CON'].includes(vtype);

  // Auto-calc GST for sales/purchase
  useEffect(() => {
    if(!isGstVoucher) return;
    if(!f.items || f.items.length===0) return;
    const party = data.parties.find(p => p.id === f.partyId);
    const isInterState = party && party.stateCode !== data.company.stateCode && !party.isForeign;
    const isExport = party && party.isForeign;

    let taxable = 0, cgst = 0, sgst = 0, igst = 0;
    f.items.forEach(it => {
      const amt = (it.qty || 0) * (it.rate || 0);
      taxable += amt;
      const tax = amt * (it.gstRate || 0) / 100;
      if(isExport){ /* zero-rated */ }
      else if(isInterState){ igst += tax; }
      else { cgst += tax/2; sgst += tax/2; }
    });
    const total = taxable + cgst + sgst + igst;
    if(Math.abs((f.taxable||0) - taxable) > 0.01 || Math.abs((f.total||0) - total) > 0.01){
      // Generate lines for double-entry
      const lines = [];
      // Dr Customer / Cr Vendor for total
      if(vtype === 'SAL'){
        if(f.partyId){
          lines.push({id:uid(), accountId:'2400', debit:total, credit:0, narration:'To ' + (party?.name||'')});
        }
        f.items.forEach(it => {
          const amt = (it.qty||0)*(it.rate||0);
          if(amt>0) lines.push({id:uid(), accountId: it.accountId || '3100', debit:0, credit:amt, narration:it.description});
        });
        if(isInterState && igst>0) lines.push({id:uid(), accountId:'1312', debit:0, credit:igst, narration:'IGST Output'});
        if(!isInterState && cgst>0) lines.push({id:uid(), accountId:'1310', debit:0, credit:cgst, narration:'CGST Output'});
        if(!isInterState && sgst>0) lines.push({id:uid(), accountId:'1311', debit:0, credit:sgst, narration:'SGST Output'});
      } else if(vtype === 'PUR'){
        f.items.forEach(it => {
          const amt = (it.qty||0)*(it.rate||0);
          if(amt>0) lines.push({id:uid(), accountId: it.accountId || '4100', debit:amt, credit:0, narration:it.description});
        });
        if(isInterState && igst>0) lines.push({id:uid(), accountId:'2602', debit:igst, credit:0, narration:'IGST Input'});
        if(!isInterState && cgst>0) lines.push({id:uid(), accountId:'2600', debit:cgst, credit:0, narration:'CGST Input'});
        if(!isInterState && sgst>0) lines.push({id:uid(), accountId:'2601', debit:sgst, credit:0, narration:'SGST Input'});
        // Creditor = full invoice total (TDS will be split out on Post via submit)
        if(f.partyId){
          lines.push({id:uid(), accountId:'1300', debit:0, credit:total, narration:'To ' + (party?.name||'')});
        }
      }
      setF(prev => ({...prev, lines, taxable, cgst, sgst, igst, total, amount: total, isInterState, isExport}));
    }
  }, [f.items, f.partyId]);

  const addLine = () => setF({...f, lines:[...f.lines, {id:uid(), accountId:'', debit:0, credit:0, narration:''}]});
  const removeLine = (id) => setF({...f, lines:f.lines.filter(l => l.id !== id)});
  const updateLine = (id, field, value) => {
    const lines = f.lines.map(l => l.id === id ? {...l, [field]: field==='debit'||field==='credit' ? (parseFloat(value)||0) : value} : l);
    // For non-GST manual entries, recalc amount
    const amt = lines.reduce((s,l) => s + (l.debit||0), 0);
    setF({...f, lines, amount: f.amount || amt});
  };

  const addItem = () => setF({...f, items:[...(f.items||[]), {id:uid(), description:'', hsn:'', qty:1, rate:0, gstRate:18, accountId: vtype==='SAL'?'3100':'4100', itemId:''}]});
  const removeItem = (id) => setF({...f, items:f.items.filter(i => i.id !== id)});
  const updateItem = (id, field, value) => {
    let items = f.items.map(i => {
      if(i.id !== id) return i;
      const updated = {...i, [field]: ['qty','rate','gstRate'].includes(field) ? (parseFloat(value)||0) : value};
      // When a stock item is selected, auto-fill description, HSN, GST Rate
      if(field === 'itemId' && value) {
        const si = (data.stockItems||[]).find(s => s.id === value);
        if(si) {
          updated.description = updated.description || si.name;
          updated.hsn = si.hsn || updated.hsn;
          updated.gstRate = si.gstRate != null ? si.gstRate : updated.gstRate;
        }
      }
      return updated;
    });
    setF({...f, items});
  };

  const totalDr = f.lines.reduce((s,l) => s + (l.debit||0), 0);
  const totalCr = f.lines.reduce((s,l) => s + (l.credit||0), 0);
  const balanced = Math.abs(totalDr - totalCr) < 0.01;

  const submit = () => {
    let finalLines = [...f.lines];
    let finalData = {...f};

    if(f.tdsApplicable && f.tdsAmount > 0 && f.tdsLedgerId){
      // Remove any previously auto-added TDS lines
      finalLines = finalLines.filter(l => l._tdsAuto !== true);
      const drTotal = finalLines.reduce((s,l) => s+(l.debit||0),0);
      const netPayable = Math.round((drTotal - f.tdsAmount)*100)/100;

      if(vtype === 'JV'){
        // Find the main credit line (non-TDS)
        const credLine = finalLines.find(l => (l.credit||0) > 0 && !l._tdsAuto);
        if(credLine){
          // Always SET to Dr - TDS (idempotent — safe for new and update)
          credLine.credit = Math.round(Math.max(0, drTotal - f.tdsAmount)*100)/100;
        }
      }

      if(vtype === 'PUR'){
        // Always SET Creditor = invoice total - TDS (not reduce, to avoid repeated reduction on edit)
        const credLine = finalLines.find(l => l.accountId === '1300' && !l._tdsAuto);
        if(credLine){
          // f.total = invoice total (taxable + GST); net payable = total - TDS
          credLine.credit = Math.round(Math.max(0, (f.total||drTotal) - f.tdsAmount)*100)/100;
        }
      }

      // Inject TDS Payable credit line
      finalLines.push({id:uid(), accountId:f.tdsLedgerId, debit:0, credit:f.tdsAmount,
        narration:'TDS u/s '+(f.tdsSection||''), _tdsAuto:true});
      finalData = {...f, lines: finalLines};
    }

    // Remove empty lines (no account, no amounts) before posting
    finalData = {...finalData, lines: finalData.lines.filter(l => l.accountId && ((l.debit||0)>0 || (l.credit||0)>0))};
    const dr2 = finalData.lines.reduce((s,l) => s+(l.debit||0),0);
    const cr2 = finalData.lines.reduce((s,l) => s+(l.credit||0),0);
    if(Math.abs(dr2-cr2) > 0.01){
      showToast('Dr '+fmt(dr2)+' vs Cr '+fmt(cr2)+' — Difference: '+fmt(Math.abs(dr2-cr2))+'. Enter Cr amount or use Auto-Balance.','error');
      return;
    }
    if(dr2 === 0){ showToast('Cannot post a zero-value entry','error'); return; }
    const party = data.parties.find(p => p.id === finalData.partyId);
    onSave({...finalData, partyName: party?.name||finalData.partyName, amount: dr2});
  };

  // PAY/REC/CON — state lifted to avoid nested-component re-mount flicker
  const initBankAcc = () => {
    if(voucher && voucher.lines){
      if(vtype==='PAY') return voucher.lines.find(l=>(l.credit||0)>0)?.accountId || '2510';
      return voucher.lines.find(l=>(l.debit||0)>0)?.accountId || '2510';
    }
    return '2510';
  };
  const initContraAcc = () => {
    if(voucher && voucher.lines){
      if(vtype==='PAY') return voucher.lines.find(l=>(l.debit||0)>0)?.accountId || '';
      return voucher.lines.find(l=>(l.credit||0)>0)?.accountId || '';
    }
    return '';
  };
  const [spBank, setSpBank]     = useState(initBankAcc);
  const [spAmt,  setSpAmt]      = useState(voucher?.amount || 0);
  const [spContra, setSpContra] = useState(initContraAcc);

  useEffect(() => {
    if(!isCashType) return;
    const lines = [];
    if(vtype === 'PAY'){
      if(spContra) lines.push({id:'l1', accountId: spContra, debit: spAmt, credit: 0});
      if(spBank)   lines.push({id:'l2', accountId: spBank,   debit: 0, credit: spAmt});
    } else if(vtype === 'REC'){
      if(spBank)   lines.push({id:'l1', accountId: spBank,   debit: spAmt, credit: 0});
      if(spContra) lines.push({id:'l2', accountId: spContra, debit: 0, credit: spAmt});
    } else if(vtype === 'CON'){
      if(spBank)   lines.push({id:'l1', accountId: spBank,   debit: spAmt, credit: 0});
      if(spContra) lines.push({id:'l2', accountId: spContra, debit: 0, credit: spAmt});
    }
    setF(prev => ({...prev, lines, amount: spAmt}));
  }, [spBank, spAmt, spContra]);


  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal wide" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2 className="modal-title">{vt.icon} {voucher ? 'Edit' : 'New'} {vt.name} {voucher && <span style={{fontFamily:'var(--mono)', fontSize:13, color:'var(--ink-3)'}}>· {voucher.number}</span>}</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid" style={{marginBottom:14}}>
            <div className="field required"><label>Date</label><input type="date" value={f.date} onChange={e => setF({...f, date:e.target.value})} /></div>
            <div className="field"><label>Voucher No.</label><input value={f.number} onChange={e => setF({...f, number:e.target.value})} placeholder="Auto-generated" /></div>
            <div className="field"><label>Reference</label><input value={f.reference} onChange={e => setF({...f, reference:e.target.value})} placeholder="PO#, Bill#, Chq#..." /></div>
            {(isGstVoucher || ['PAY','REC'].includes(vtype)) && (
              <div className="field">
                <label>
                  {vtype==='SAL'||vtype==='CRN'?'Customer':vtype==='PUR'||vtype==='DBN'?'Vendor':'Party'}
                  {['PAY','REC'].includes(vtype) && <span style={{fontWeight:400,fontSize:10,color:'var(--ink-3)',marginLeft:6}}>— select to include in party statement</span>}
                </label>
                <select value={f.partyId} onChange={e => {
                  const p = data.parties.find(x => x.id === e.target.value);
                  setF({...f, partyId:e.target.value, partyName: p?.name||'', currency: p?.currency||'INR', placeOfSupply: p?.stateCode || data.company.stateCode});
                }}>
                  <option value="">— Select Party —</option>
                  {data.parties.filter(p => isGstVoucher ? (vtype==='SAL'||vtype==='CRN' ? p.type==='Customer' : p.type==='Vendor') : true).map(p => <option key={p.id} value={p.id}>{p.name} {p.gstin?'· '+p.gstin:''}</option>)}
                </select>
              </div>
            )}
            {isGstVoucher && (
              <div className="field"><label>Place of Supply</label><input value={f.placeOfSupply} onChange={e => setF({...f, placeOfSupply:e.target.value})} maxLength="2" /></div>
            )}
            {f.currency && f.currency !== 'INR' && (
              <div className="field"><label>FX Rate (1 {f.currency} = ₹)</label><input type="number" step="0.0001" value={f.fxRate} onChange={e => setF({...f, fxRate:parseFloat(e.target.value)||1})} /></div>
            )}
          </div>

          {(vtype==='SAL' || vtype==='PUR' || vtype==='CRN' || vtype==='DBN') ? (
            <>
              <div className="section-divider">
                <div className="label">Line Items</div>
                <div className="line"></div>
                <button className="btn btn-sm btn-ghost" onClick={addItem}>+ Add Item</button>
              </div>
              {(() => {
                const mod = data.company.modules || {};
                const hasStock = mod.trader || mod.factory;
                const stockItems = data.stockItems || [];
                return (
                <table className="lines-table">
                  <thead>
                    <tr>
                      {hasStock && <th style={{width:140}}>Stock Item</th>}
                      <th style={{width:'25%'}}>Description</th>
                      <th>Account</th>
                      <th style={{width:80}}>HSN/SAC</th>
                      <th style={{width:60}}>Qty</th>
                      <th style={{width:90}}>Rate</th>
                      <th style={{width:60}}>GST %</th>
                      <th className="num" style={{width:100}}>Taxable</th>
                      <th className="num" style={{width:100}}>Tax</th>
                      <th className="num" style={{width:110}}>Total</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {(f.items||[]).map(it => {
                      const taxable = (it.qty||0) * (it.rate||0);
                      const tax = taxable * (it.gstRate||0) / 100;
                      return (
                        <tr key={it.id}>
                          {hasStock && (
                            <td>
                              <select value={it.itemId||''} onChange={e => updateItem(it.id, 'itemId', e.target.value)}
                                style={{fontSize:11}}>
                                <option value="">— none —</option>
                                {stockItems.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                              </select>
                            </td>
                          )}
                          <td><input value={it.description} onChange={e => updateItem(it.id, 'description', e.target.value)} placeholder="Item description" /></td>
                          <td><select value={it.accountId} onChange={e => updateItem(it.id, 'accountId', e.target.value)}>
                            {data.coa.filter(a => vtype==='SAL'||vtype==='CRN' ? a.type==='Income' : a.type==='Expense').map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                          </select></td>
                          <td><input value={it.hsn||''} onChange={e => updateItem(it.id, 'hsn', e.target.value)} placeholder="HSN" /></td>
                          <td><input type="number" value={it.qty} onChange={e => updateItem(it.id, 'qty', e.target.value)} /></td>
                          <td><input type="number" step="0.01" value={it.rate} onChange={e => updateItem(it.id, 'rate', e.target.value)} /></td>
                          <td><select value={it.gstRate} onChange={e => updateItem(it.id, 'gstRate', e.target.value)}>
                            <option value="0">0%</option><option value="5">5%</option><option value="12">12%</option><option value="18">18%</option><option value="28">28%</option>
                          </select></td>
                          <td className="num">{fmt(taxable)}</td>
                          <td className="num">{fmt(tax)}</td>
                          <td className="num bold">{fmt(taxable+tax)}</td>
                          <td><span className="row-del" onClick={() => removeItem(it.id)}>×</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                );
              })()}
              {(f.items||[]).length === 0 && <div className="empty" style={{padding:20}}>Click "+ Add Item" to add line items</div>}
              {(f.items||[]).length > 0 && (
                <div style={{marginTop:14, display:'grid', gridTemplateColumns:'1fr auto', gap:20}}>
                  <div></div>
                  <div style={{background:'var(--surface-2)', padding:14, borderRadius:8, minWidth:280}}>
                    <div style={{display:'flex', justifyContent:'space-between', padding:'3px 0'}}><span>Taxable Value:</span> <b className="rupee">₹{fmt(f.taxable||0)}</b></div>
                    {f.isExport ? <div style={{color:'var(--info)'}}>Export — Zero-rated supply</div> : f.isInterState ? (
                      <div style={{display:'flex', justifyContent:'space-between', padding:'3px 0'}}><span>IGST:</span> <b className="rupee">₹{fmt(f.igst||0)}</b></div>
                    ) : (<>
                      <div style={{display:'flex', justifyContent:'space-between', padding:'3px 0'}}><span>CGST:</span> <b className="rupee">₹{fmt(f.cgst||0)}</b></div>
                      <div style={{display:'flex', justifyContent:'space-between', padding:'3px 0'}}><span>SGST:</span> <b className="rupee">₹{fmt(f.sgst||0)}</b></div>
                    </>)}
                    <div style={{display:'flex', justifyContent:'space-between', padding:'8px 0 0', marginTop:6, borderTop:'2px solid var(--primary)', color:'var(--primary)', fontWeight:700, fontSize:14}}><span>Invoice Total:</span> <span className="rupee">₹{fmt(f.total||0)}</span></div>
                  </div>
                </div>
              )}
            </>
          ) : isCashType ? (
            (() => {
              const bankCash = data.coa.filter(a =>
                a.isBank === true || a.schedule === 'Cash & Equivalents' ||
                a.name.toLowerCase().includes('cash') || a.name.toLowerCase().includes('bank')
              );
              const contraOptions = vtype === 'PAY'
                ? data.coa.filter(a => a.type==='Expense' || a.type==='Liability')
                : vtype === 'REC'
                ? data.coa.filter(a => a.type==='Asset' || a.type==='Income')
                : bankCash;
              const toName = data.coa.find(a => a.id === spBank)?.name || '';
              const frName = data.coa.find(a => a.id === spContra)?.name || '';
              return (
                <div style={{display:'flex', flexDirection:'column', gap:14}}>
                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 180px', gap:14}}>
                    <div className="field">
                      <label>{vtype==='CON' ? '↓ To (Dr) — Receiving Account' : vtype==='PAY' ? 'Pay From (Bank / Cash)' : 'Deposit To (Bank / Cash)'}</label>
                      <select value={spBank} onChange={e => setSpBank(e.target.value)}
                        style={{padding:'8px 10px', border:'1px solid var(--line-2)', borderRadius:6, fontSize:13, width:'100%', background:'var(--surface)', color:'var(--ink)'}}>
                        <option value="">— Select Bank / Cash —</option>
                        {bankCash.map(a => <option key={a.id} value={a.id}>{a.id} · {a.name}</option>)}
                      </select>
                    </div>
                    <div className="field">
                      <label>{vtype==='CON' ? '↑ From (Cr) — Source Account' : vtype==='PAY' ? 'Pay To (Vendor / Expense)' : 'Receive From (Customer / Income)'}</label>
                      <select value={spContra} onChange={e => setSpContra(e.target.value)}
                        style={{padding:'8px 10px', border:'1px solid var(--line-2)', borderRadius:6, fontSize:13, width:'100%', background:'var(--surface)', color:'var(--ink)'}}>
                        <option value="">— Select Account —</option>
                        {contraOptions.map(a => <option key={a.id} value={a.id}>{a.id} · {a.name}</option>)}
                      </select>
                    </div>
                    <div className="field">
                      <label>Amount (₹)</label>
                      <input type="number" value={spAmt} onChange={e => setSpAmt(parseFloat(e.target.value)||0)}
                        style={{padding:'8px 10px', border:'1px solid var(--line-2)', borderRadius:6, fontSize:13, width:'100%'}} />
                    </div>
                  </div>
                  {spBank && spContra && spAmt > 0 && (
                    <div style={{padding:'10px 14px', background:'var(--primary-soft)', borderRadius:8, fontSize:12, color:'var(--primary)'}}>
                      <b>Entry: </b>
                      {vtype==='CON' && <span>Dr <b>{toName}</b> ₹{fmt(spAmt)} &nbsp;|&nbsp; Cr <b>{frName}</b> ₹{fmt(spAmt)}</span>}
                      {vtype==='PAY' && <span>Dr <b>{frName}</b> ₹{fmt(spAmt)} &nbsp;|&nbsp; Cr <b>{toName}</b> ₹{fmt(spAmt)}</span>}
                      {vtype==='REC' && <span>Dr <b>{toName}</b> ₹{fmt(spAmt)} &nbsp;|&nbsp; Cr <b>{frName}</b> ₹{fmt(spAmt)}</span>}
                    </div>
                  )}
                </div>
              );
            })()
          ) : (
            <>
              <div className="section-divider">
                <div className="label">Journal Lines (Dr/Cr)</div>
                <div className="line"></div>
                <button className="btn btn-sm btn-ghost" onClick={addLine}>+ Add Line</button>
              </div>
              <table className="lines-table">
                <thead>
                  <tr><th style={{width:'40%'}}>Account</th><th>Narration</th><th className="num" style={{width:130}}>Debit</th><th className="num" style={{width:130}}>Credit</th><th></th></tr>
                </thead>
                <tbody>
                  {f.lines.map(l => {
                    const selAcc = data.coa.find(a => a.id === l.accountId);
                    const isPartyAcc = selAcc && (selAcc.name.toLowerCase().includes('creditor') || selAcc.name.toLowerCase().includes('debtor') || selAcc.name.toLowerCase().includes('receivable') || selAcc.name.toLowerCase().includes('payable') && !selAcc.name.toLowerCase().includes('tds') && !selAcc.name.toLowerCase().includes('gst'));
                    return (
                    <React.Fragment key={l.id}>
                    <tr>
                      <td>
                        <SearchableSelect
                          options={data.coa.map(a => ({value:a.id, label:a.id+' · '+a.name}))}
                          value={l.accountId}
                          onChange={v => updateLine(l.id, 'accountId', v)}
                          placeholder="Type to search account..."
                        />
                        <div style={{marginTop:3}}>
                          <button className="btn btn-sm btn-ghost" style={{fontSize:10, padding:'2px 6px', color:'var(--primary)'}} onClick={() => {
                            const name = prompt('New Ledger Name:'); if(!name) return;
                            const code = prompt('Account Code (e.g. 4570):'); if(!code) return;
                            if(data.coa.find(a => a.id === code)){ showToast('Code '+code+' already exists', 'error'); return; }
                            const type = prompt('Type (Asset/Liability/Income/Expense):','Expense') || 'Expense';
                            const newAcc = {id:code, name, type, group:'Other Expenses', schedule:'Other Expenses', opening:0};
                            // Use the parent setData via a custom event to avoid prop-drilling
                            const evt = new CustomEvent('miyeebooks-add-account', {detail: newAcc});
                            window.dispatchEvent(evt);
                            updateLine(l.id, 'accountId', code);
                            showToast('Ledger '+code+' created — save voucher to persist');
                          }}>+ New Ledger</button>
                        </div>
                      </td>
                      <td>
                        <input value={l.narration} onChange={e => updateLine(l.id, 'narration', e.target.value)} placeholder="Line narration" />
                      </td>
                      <td><input type="number" step="0.01" value={l.debit||''} onChange={e => updateLine(l.id, 'debit', e.target.value)} style={{textAlign:'right'}} /></td>
                      <td><input type="number" step="0.01" value={l.credit||''} onChange={e => updateLine(l.id, 'credit', e.target.value)} style={{textAlign:'right'}} /></td>
                      <td><span className="row-del" onClick={() => removeLine(l.id)}>×</span></td>
                    </tr>
                    {isPartyAcc && (
                      <tr><td colSpan="5" style={{padding:'4px 8px', background:'var(--primary-soft)', borderBottom:'1px solid var(--line)'}}>
                        <div style={{display:'flex', gap:8, alignItems:'center', fontSize:11}}>
                          <span style={{color:'var(--primary)', fontWeight:600}}>↳ Select {selAcc.name.includes('Creditor')||selAcc.name.includes('Payable')?'Vendor':'Customer'}:</span>
                          <select value={l.partyId||f.partyId||''} onChange={e => {
                            const p = data.parties.find(x => x.id === e.target.value);
                            updateLine(l.id, 'partyId', e.target.value);
                            updateLine(l.id, 'narration', p ? (l.debit>0?'From ':'To ') + p.name : '');
                            if(p && !f.partyId) setF(prev => ({...prev, partyId:e.target.value, partyName:p.name}));
                          }} style={{flex:1, padding:'4px 6px', border:'1px solid var(--line)', borderRadius:4, fontSize:11}}>
                            <option value="">— Select Party —</option>
                            {data.parties.filter(p => selAcc.name.includes('Creditor')||selAcc.name.includes('Payable') ? p.type==='Vendor' : p.type==='Customer').map(p => (
                              <option key={p.id} value={p.id}>{p.name}{p.gstin?' · '+p.gstin:''}</option>
                            ))}
                          </select>
                          <button className="btn btn-sm btn-ghost" style={{fontSize:10, padding:'2px 6px'}} onClick={() => {
                            const name = prompt('New Party Name:'); if(!name) return;
                            const type = selAcc.name.includes('Creditor')||selAcc.name.includes('Payable') ? 'Vendor' : 'Customer';
                            const gstin = prompt('GSTIN (15 chars, leave blank for URD):','');
                            const newParty = {id:uid(), name, type, gstin:gstin||'', state:'Gujarat', stateCode:'24', address:'', email:'', phone:'', currency:'INR', balance:0, unregistered:!gstin};
                            window.dispatchEvent(new CustomEvent('miyeebooks-add-party', {detail: newParty}));
                            updateLine(l.id, 'partyId', newParty.id);
                            updateLine(l.id, 'narration', (l.debit>0?'From ':'To ') + name);
                            setF(prev => ({...prev, partyId:newParty.id, partyName:name}));
                            showToast(type+' "'+name+'" created');
                          }}>+ New {selAcc.name.includes('Creditor')||selAcc.name.includes('Payable')?'Vendor':'Customer'}</button>
                        </div>
                      </td></tr>
                    )}
                    </React.Fragment>
                    );
                  })}
                  <tr style={{background:'var(--surface-2)', fontWeight:700}}>
                    <td colSpan="2" style={{textAlign:'right', padding:'8px 12px'}}>TOTAL</td>
                    <td className="num bold" style={{padding:'8px 12px'}}>₹{fmt(totalDr)}</td>
                    <td className="num bold" style={{padding:'8px 12px'}}>₹{fmt(totalCr)}</td>
                    <td></td>
                  </tr>
                  <tr>
                    <td colSpan="5" style={{textAlign:'right', padding:'6px 12px', fontSize:12}}>
                      Difference: <b className={balanced?'pos':'neg'}>₹{fmt(totalDr-totalCr)}</b> {balanced && <span className="badge badge-success">Balanced</span>}
                      {!balanced && totalDr > 0 && (
                        <button className="btn btn-sm btn-primary" style={{marginLeft:10}} onClick={() => {
                          const tdsAmt = (f.tdsApplicable && f.tdsAmount > 0) ? f.tdsAmount : 0;
                          // Set Cr = Dr - TDS so that after Post adds TDS Payable Cr, total Cr = Dr
                          // i.e. Creditor Cr = 98000, then Post adds TDS Payable Cr 2000 = 100000 = Dr
                          const correctCr = Math.round((totalDr - tdsAmt) * 100) / 100;
                          const liabilityLine = f.lines.find(l =>
                            l.accountId && data.coa.find(a => a.id === l.accountId && a.type === 'Liability')
                          );
                          const creditorLine = f.lines.find(l =>
                            l.accountId && (l.accountId.startsWith('13') || l.accountId.startsWith('12'))
                          );
                          const anyAccLine = [...f.lines].reverse().find(l => l.accountId);
                          const target = liabilityLine || creditorLine || anyAccLine || f.lines[f.lines.length-1];
                          if(target){
                            const updated = f.lines.map(l =>
                              l.id === target.id ? {...l, credit: correctCr, debit: 0} : l
                            );
                            setF({...f, lines: updated});
                          }
                        }}>⚡ Auto-Balance Cr</button>
                      )}
                    </td>
                  </tr>
                </tbody>
              </table>
            </>
          )}

          {/* TDS Deduction Section — for PUR, JV, PAY */}
          {['PUR','JV','PAY'].includes(vtype) && (
            <div style={{marginTop:14, padding:14, border:'1px solid var(--accent)', borderRadius:8, background:'var(--accent-soft)'}}>

                <span style={{fontWeight:600, fontSize:12, color:'var(--warning)'}}>§ TDS Deduction (New IT Act 2025)</span>
                <label style={{fontSize:11, display:'flex', alignItems:'center', gap:6}}>
                  <input type="checkbox" checked={f.tdsApplicable||false} onChange={e => setF({...f, tdsApplicable:e.target.checked, tdsSection:'', tdsRate:0, tdsAmount:0, tdsLedgerId:'', tdsBaseAmount:0})} /> Apply TDS
                </label>
              </div>
              {f.tdsApplicable && (
                <>
                  <div className="form-grid" style={{gridTemplateColumns:'1.5fr 120px 90px 120px'}}>
                    <div className="field">
                      <label>TDS Section</label>
                      <select value={f.tdsSectionId||''} onChange={e => {
                        const sec = (data.tdsSections||[]).find(s => s.id === e.target.value);
                        if(sec){
                          const base = f.tdsBaseAmount || f.taxable || f.total || f.amount || totalDr || 0;
                          const tdsAmt = Math.round(base * sec.rate / 100 * 100) / 100;
                          // ledgerId fallback: use sec.ledgerId, else find by name match in COA
                          let ledgerId = sec.ledgerId || '';
                          if(!ledgerId || !data.coa.find(a => a.id === ledgerId)){
                            const matched = data.coa.find(a => a.name.toLowerCase().includes('tds payable'));
                            ledgerId = matched ? matched.id : '1313';
                          }
                          setF({...f, tdsSectionId:sec.id,
                            tdsSection: sec.section + (sec.oldSection ? ' (Old: '+sec.oldSection+')' : '') +' — '+sec.name,
                            tdsRate: sec.rate, tdsAmount: tdsAmt,
                            tdsLedgerId: ledgerId,
                            tdsNature: sec.nature,
                            tdsBaseAmount: base || f.tdsBaseAmount
                          });
                        }
                      }}>
                        <option value="">— Select TDS Section —</option>
                        {(data.tdsSections||[]).filter(s => !s.isSalary).map(s => (
                          <option key={s.id} value={s.id}>§{s.section}{s.oldSection?' (Old: '+s.oldSection+')':''} — {s.name} ({s.rate}%)</option>
                        ))}
                      </select>
                    </div>
                    <div className="field required">
                      <label>TDS Deducted On (₹)</label>
                      <input type="number" step="0.01" value={f.tdsBaseAmount||0} onChange={e => {
                        const base = parseFloat(e.target.value)||0;
                        const tdsAmt = Math.round(base * (f.tdsRate||0) / 100 * 100) / 100;
                        setF({...f, tdsBaseAmount:base, tdsAmount:tdsAmt});
                      }} placeholder="Base amount" />
                      <div className="help">Amount on which TDS is calculated</div>
                    </div>
                    <div className="field">
                      <label>Rate %</label>
                      <input type="number" step="0.01" value={f.tdsRate||0} onChange={e => {
                        const rate = parseFloat(e.target.value)||0;
                        const base = f.tdsBaseAmount || 0;

                    <div className="field">
                      <label>TDS Amount (₹)</label>
                      <input type="number" step="0.01" value={f.tdsAmount||0} onChange={e => setF({...f, tdsAmount:parseFloat(e.target.value)||0})} />
                    </div>
                  </div>
                  <div className="form-grid" style={{gridTemplateColumns:'1fr', marginTop:8}}>
                    <div className="field">
                      <label>TDS Payable Ledger (auto-fetched from section)</label>
                      <SearchableSelect
                        options={data.coa.filter(a => a.name.toLowerCase().includes('tds payable')).map(a => ({value:a.id, label:a.id+' · '+a.name}))}
                        value={f.tdsLedgerId||''}
                        onChange={v => setF({...f, tdsLedgerId:v})}

                  <div style={{fontWeight:600, marginBottom:4, color:'var(--ink)'}}>TDS Entry Summary</div>
                  <div>📌 <b>Dr</b> {f.lines.find(l=>(l.debit||0)>0) ? (data.coa.find(a=>a.id===f.lines.find(l=>(l.debit||0)>0)?.accountId)?.name||'Expense A/c') : 'Expense A/c'} ₹{fmt(f.total||totalDr||0)}</div>
                  <div style={{marginTop:3}}>📌 <b>Cr</b> {data.coa.find(a=>a.id===f.tdsLedgerId)?.name||'TDS Payable'} ₹{fmt(f.tdsAmount)} <span style={{color:'var(--ink-3)'}}>(TDS u/s {f.tdsSection||'—'} @ {f.tdsRate}%)</span></div>
                  <div style={{marginTop:3}}>📌 <b>Cr</b> Sundry Creditors / Party <b style={{color:'var(--primary)'}}>₹{fmt(Math.max(0,(f.total||totalDr||0) - (f.tdsAmount||0)))}</b> <span style={{color:'var(--ink-3)'}}>(Net payable after TDS)</span></div>
                  {vtype==='JV' && (
                    <div style={{marginTop:6, padding:'6px 8px', background:'var(--accent-soft)', borderRadius:4, color:'var(--warning)', fontSize:11}}>
                      ⚡ Click <b>Auto-Balance Cr</b> above → sets Creditor = <b>₹{fmt(Math.max(0,(totalDr||0) - (f.tdsAmount||0)))}</b>. On Post, TDS Payable ₹{fmt(f.tdsAmount||0)} auto-credited → entry balanced.
                    </div>
                  )}

          )}

          <div className="field" style={{marginTop:14}}>

}

function DayBook({data}){
  const [from, setFrom] = useState(data.company.fyStart);
  const [to, setTo] = useState(today());
  const [typeFilter, setTypeFilter] = useState('All');

  const entries = data.vouchers
    .filter(v => v.status !== 'Cancelled' && v.date >= from && v.date <= to)
    .filter(v => typeFilter === 'All' || v.type === typeFilter)
    .sort((a,b) => a.date.localeCompare(b.date) || a.number.localeCompare(b.number));

  const totalDr = entries.reduce((s,v) => s + (v.lines||[]).reduce((ss,l) => ss + (l.debit||0), 0), 0);
  const totalCr = entries.reduce((s,v) => s + (v.lines||[]).reduce((ss,l) => ss + (l.credit||0), 0), 0);

  const findAcc = (id) => data.coa.find(a => a.id === id);

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Day Book</h1>
          <div className="page-sub">Chronological journal · {entries.length} vouchers in period</div>
        </div>
        <div className="page-actions">
          <button className="btn" onClick={() => window.print()}>⎙ Print</button>
        </div>
      </div>

      <div className="filter-bar">
        <div className="field"><label>From</label><input type="date" value={from} onChange={e => setFrom(e.target.value)} /></div>
        <div className="field"><label>To</label><input type="date" value={to} onChange={e => setTo(e.target.value)} /></div>
        <div className="field"><label>Voucher Type</label>
          <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)}>
            <option>All</option>
            {VOUCHER_TYPES.map(vt => <option key={vt.code} value={vt.code}>{vt.name}</option>)}
          </select>
        </div>

        <table>
          <thead>
            <tr>
              <th style={{width:90}}>Date</th>
              <th style={{width:100}}>Vch No.</th>
              <th style={{width:60}}>Type</th>
              <th>Particulars</th>
              <th className="num" style={{width:120}}>Debit (₹)</th>
              <th className="num" style={{width:120}}>Credit (₹)</th>
            </tr>

            {entries.length === 0 ? (
              <tr><td colSpan="6"><div className="empty"><div className="empty-ico">∅</div><div>No vouchers in this period</div></div></td></tr>
            ) : entries.map(v => (
              <React.Fragment key={v.id}>
                <tr style={{background:'var(--surface-2)'}}>
                  <td>{v.date}</td>
                  <td style={{fontFamily:'var(--mono)', fontWeight:600}}>{v.number}</td>
                  <td><span className="badge badge-info">{v.type}</span></td>

                </tr>
                {(v.lines||[]).map(l => {
                  const acc = findAcc(l.accountId);
                  return (
                    <tr key={l.id}>
                      <td></td><td></td><td></td>
                      <td style={{paddingLeft:30, fontSize:12}}>{l.debit>0 ? '' : '   '}<b>{acc?.name || l.accountId}</b>{l.narration && <span style={{color:'var(--ink-3)'}}> — {l.narration}</span>}</td>
                      <td className="num">{l.debit>0 ? fmt(l.debit) : ''}</td>
                      <td className="num">{l.credit>0 ? fmt(l.credit) : ''}</td>

function ProfitLoss({data, balances}){
  const [period, setPeriod] = useState('FY');

  const get = (filter) => data.coa.filter(filter).reduce((s,a) => {
    const b = balances[a.id] || 0;
    return s + (a.type==='Income' ? -b : b);
  }, 0);

  const revenue = get(a => a.type==='Income' && a.group==='Revenue from Operations');
  const otherIncome = get(a => a.type==='Income' && a.group==='Other Income');
  const costMat = get(a => a.group==='Cost of Materials' || a.group==='Purchase of Stock-in-Trade');
  const empBenefit = get(a => a.group==='Employee Benefit Expenses');
  const finCost = get(a => a.group==='Finance Costs');
  const depr = get(a => a.group==='Depreciation');
  const otherExp = get(a => a.group==='Other Expenses');
  const totalRev = revenue + otherIncome;
  const totalExp = costMat + empBenefit + finCost + depr + otherExp;
  const pbt = totalRev - totalExp;
  const tax = pbt > 0 ? pbt * 0.25 : 0;  // 25% rough
  const pat = pbt - tax;

  const row = (label, val, isBold) => (
    <tr style={isBold ? {fontWeight:700, background:'var(--surface-2)'} : {}}>
      <td>{label}</td>
      <td className="num">₹{fmt(val)}</td>
    </tr>
  );

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Profit & Loss Statement</h1>
          <div className="page-sub">Schedule III, Division I · Period: {data.company.fyStart} to {today()}</div>
        </div>
        <div className="page-actions">
          <button className="btn" onClick={() => window.print()}>⎙ Print</button>
        </div>
      </div>

      <div className="report">
        <div className="report-head">
          {data.company.logo && <img className="report-logo" src={data.company.logo} alt="Logo" />}

          <div style={{fontSize:11, color:'var(--ink-3)'}}>CIN: {data.company.cin} · GSTIN: {data.company.gstin}</div>
          <div className="report-title">Statement of Profit & Loss</div>
          <div className="report-period">For the period {data.company.fyStart} to {today()}</div>
        </div>

        <table>
          <thead>
            <tr><th>Particulars</th><th className="num" style={{width:180}}>Amount (₹)</th></tr>
          </thead>
          <tbody>
            <tr className="group"><td colSpan="2">I. INCOME</td></tr>
            {row('Revenue from Operations', revenue)}
            {row('Other Income', otherIncome)}
            {row('Total Income (I)', totalRev, true)}

            <tr className="group"><td colSpan="2">II. EXPENSES</td></tr>
            {row('Cost of Materials Consumed / Purchases', costMat)}
            {row('Employee Benefit Expenses', empBenefit)}
            {row('Finance Costs', finCost)}
            {row('Depreciation & Amortization', depr)}
            {row('Other Expenses', otherExp)}
            {row('Total Expenses (II)', totalExp, true)}

            <tr className="total"><td>III. Profit Before Tax (I − II)</td><td className="num">₹{fmt(pbt)}</td></tr>

            <tr className="group"><td colSpan="2">IV. TAX EXPENSE</td></tr>
            {row('Current Tax (estimated @ 25%)', tax)}
            {row('Deferred Tax', 0)}

            <tr className="total"><td>V. Profit for the Period (PAT)</td><td className="num">₹{fmt(pat)}</td></tr>

            <tr><td style={{paddingTop:14, fontSize:11, color:'var(--ink-3)'}}>Earnings Per Share (Basic & Diluted)</td><td className="num" style={{fontSize:11, color:'var(--ink-3)'}}>₹{((pat / Math.max(1, (balances['1100']||1000000)/10)) || 0).toFixed(2)}</td></tr>
          </tbody>
        </table>

        <div className="report-foot">
          <span>Notes: Tax estimate at 25% MSME rate · Subject to audit · Generated {new Date().toLocaleDateString('en-IN')}</span>
          <span>MiyeeBooks · {data.company.name}</span>
        </div>
      </div>
    </>
  );
}

function BalanceSheet({data, balances}){
  const [asOn, setAsOn] = useState(today());

  // Compute current period profit (for Reserves & Surplus)
  const getBal = (id) => balances[id] || 0;
  const sumByGroup = (groupName) => data.coa.filter(a => a.group === groupName).reduce((s,a) => {
    const b = getBal(a.id);
    if(a.type==='Asset') return s + b;
    if(['Liability','Equity'].includes(a.type)) return s + (-b);
    return s;
  }, 0);
  const sumByType = (type, contraExclude=true) => data.coa.filter(a => a.type===type && (!contraExclude || !a.contra)).reduce((s,a) => {
    const b = getBal(a.id);
    if(a.type==='Asset') return s + b;
    if(['Liability','Equity','Income'].includes(a.type)) return s + (-b);
    if(a.type==='Expense') return s + b;
    return s;
  }, 0);

  // Profit for period
  const income = data.coa.filter(a => a.type==='Income').reduce((s,a) => s + (-getBal(a.id)), 0);
  const expense = data.coa.filter(a => a.type==='Expense').reduce((s,a) => s + getBal(a.id), 0);
  const currentProfit = income - expense;

  // Equity & Liabilities
  const shareCapital = -getBal('1100');
  const reserves = -getBal('1110') + currentProfit;
  const lt_borrowings = -getBal('1200');
  const dtl = -getBal('1210');
  const tradePayables = -getBal('1300');
  const otherCL = -(getBal('1310')+getBal('1311')+getBal('1312')+getBal('1313')+getBal('1320'));
  const provisions = -getBal('1330');

  // Assets
  const grossPPE = getBal('2100') + getBal('2110') + getBal('2120');
  const accDepr = getBal('2130');  // negative
  const netPPE = grossPPE + accDepr;
  const investments = getBal('2200');
  const inventory = getBal('2300') + getBal('2310');
  const tradeReceivables = getBal('2400');
  const cashEq = getBal('2500') + getBal('2510') + getBal('2511') + getBal('2520');
  const otherCA = getBal('2600') + getBal('2601') + getBal('2602') + getBal('2700');

  const totalEquity = shareCapital + reserves;
  const totalNCL = lt_borrowings + dtl;
  const totalCL = tradePayables + otherCL + provisions;
  const totalLiab = totalEquity + totalNCL + totalCL;

  const totalNCA = netPPE + investments;
  const totalCA = inventory + tradeReceivables + cashEq + otherCA;
  const totalAssets = totalNCA + totalCA;

  const row = (label, val, indent=false, bold=false) => (
    <tr style={bold?{fontWeight:700}:{}}>
      <td style={{paddingLeft: indent?28:12}}>{label}</td>
      <td className="num">{val !== null ? '₹'+fmt(val) : ''}</td>
    </tr>
  );

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Balance Sheet</h1>
          <div className="page-sub">Schedule III, Division I · Vertical format · As on {asOn}</div>
        </div>
        <div className="page-actions">
          <input type="date" value={asOn} onChange={e => setAsOn(e.target.value)} className="btn" style={{padding:'6px 10px'}} />
          <button className="btn" onClick={() => window.print()}>⎙ Print</button>
        </div>
      </div>

      <div className="report">
        <div className="report-head">
          {data.company.logo && <img className="report-logo" src={data.company.logo} alt="Logo" />}
          <div className="report-co">{data.company.name}</div>
          <div style={{fontSize:11, color:'var(--ink-3)'}}>CIN: {data.company.cin} · PAN: {data.company.pan} · GSTIN: {data.company.gstin}</div>
          <div className="report-title">Balance Sheet</div>
          <div className="report-period">As at {asOn}</div>
        </div>

        <table>
          <thead>
            <tr><th>Particulars</th><th className="num" style={{width:180}}>Amount (₹)</th></tr>
          </thead>
          <tbody>
            <tr className="group"><td colSpan="2">I. EQUITY AND LIABILITIES</td></tr>

            <tr style={{fontWeight:600}}><td>(1) Shareholders' Funds</td><td></td></tr>

// ============================================================================
// CASH FLOW (AS-3 Indirect Method)
// ============================================================================
function CashFlow({data, balances}){
  const getBal = (id) => balances[id] || 0;

  // Net profit before tax (indirect method starting point)
  const income = data.coa.filter(a => a.type==='Income').reduce((s,a) => s + (-getBal(a.id)), 0);
  const expense = data.coa.filter(a => a.type==='Expense').reduce((s,a) => s + getBal(a.id), 0);
  const pbt = income - expense;

  // Non-cash adjustments
  const depr = getBal('4400');
  const interestExp = getBal('4300');
  const interestInc = -getBal('3200');
  const forexLoss = getBal('4560');
  const forexGain = -getBal('3210');

  // Working capital changes (current - opening, sign-adjusted)
  const wcChange = (id, isAsset) => {
    const acc = data.coa.find(a => a.id === id);
    if(!acc) return 0;
    const opening = acc.opening || 0;
    const current = getBal(id);
    const movement = current - opening;
    // Asset increase = cash outflow (negative); Liability increase = cash inflow (positive)
    return isAsset ? -movement : -movement;  // For liability stored as negative balance, increase in liab = more negative balance => -(more negative - less negative) = positive
  };

  const debtorsChange = -((getBal('2400')) - (data.coa.find(a => a.id==='2400')?.opening || 0));
  const inventoryChange = -(((getBal('2300')+getBal('2310'))) - ((data.coa.find(a=>a.id==='2300')?.opening||0)+(data.coa.find(a=>a.id==='2310')?.opening||0)));
  const creditorsChange = -(((-getBal('1300'))) - ((-(data.coa.find(a=>a.id==='1300')?.opening||0))));
  const gstChange = -(((-getBal('1310'))+(-getBal('1311'))+(-getBal('1312'))) - 0);

  const operatingProfit = pbt + depr + interestExp - interestInc + forexLoss - forexGain;
  const cfo = operatingProfit + debtorsChange + inventoryChange + creditorsChange + gstChange;
  const taxPaid = 0;  // Simplified
  const netCFO = cfo - taxPaid;

  // Investing
  const ppeChange = -(((getBal('2100')+getBal('2110')+getBal('2120'))) - ((data.coa.find(a=>a.id==='2100')?.opening||0)+(data.coa.find(a=>a.id==='2110')?.opening||0)+(data.coa.find(a=>a.id==='2120')?.opening||0)));
  const investChange = -((getBal('2200')) - (data.coa.find(a=>a.id==='2200')?.opening||0));
  const netCFI = ppeChange + investChange + interestInc;

  // Financing
  const borrowingChange = (-getBal('1200')) - (-(data.coa.find(a=>a.id==='1200')?.opening||0));
  const capitalChange = (-getBal('1100')) - (-(data.coa.find(a=>a.id==='1100')?.opening||0));
  const netCFF = borrowingChange + capitalChange - interestExp;

  const netChange = netCFO + netCFI + netCFF;
  const openingCash = (data.coa.find(a=>a.id==='2500')?.opening||0) + (data.coa.find(a=>a.id==='2510')?.opening||0) + (data.coa.find(a=>a.id==='2511')?.opening||0) + (data.coa.find(a=>a.id==='2520')?.opening||0);
  const closingCash = openingCash + netChange;
  const actualClosingCash = getBal('2500') + getBal('2510') + getBal('2511') + getBal('2520');

  const row = (label, val, indent=false, bold=false) => (
    <tr style={bold?{fontWeight:700, background:'var(--surface-2)'}:{}}>
      <td style={{paddingLeft:indent?28:12}}>{label}</td>
      <td className="num">{val !== null ? '₹'+fmt(val) : ''}</td>
    </tr>
  );

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Cash Flow Statement</h1>
          <div className="page-sub">AS-3 (Revised) · Indirect Method · {data.company.fyStart} to {today()}</div>
        </div>
        <div className="page-actions">
          <button className="btn" onClick={() => window.print()}>⎙ Print</button>
        </div>
      </div>

      <div className="report">
        <div className="report-head">
          {data.company.logo && <img className="report-logo" src={data.company.logo} alt="Logo" />}
          <div className="report-co">{data.company.name}</div>
          <div className="report-title">Cash Flow Statement</div>
          <div className="report-period">For the period ended {today()}</div>
        </div>

        <table>
          <thead><tr><th>Particulars</th><th className="num" style={{width:180}}>Amount (₹)</th></tr></thead>
          <tbody>
            <tr className="group"><td colSpan="2">A. CASH FLOW FROM OPERATING ACTIVITIES</td></tr>
            {row('Net Profit Before Tax', pbt)}
            <tr><td style={{paddingLeft:12, fontStyle:'italic', color:'var(--ink-3)'}}>Adjustments for non-cash items:</td><td></td></tr>
            {row('Add: Depreciation', depr, true)}
            {row('Add: Interest Expense', interestExp, true)}
            {row('Less: Interest Income', -interestInc, true)}
            {row('Add: Forex Loss / (Less: Forex Gain)', forexLoss-forexGain, true)}
            {row('Operating Profit before Working Capital Changes', operatingProfit, false, true)}
            <tr><td style={{paddingLeft:12, fontStyle:'italic', color:'var(--ink-3)'}}>Adjustments for working capital:</td><td></td></tr>
            {row('(Increase) / Decrease in Trade Receivables', debtorsChange, true)}
            {row('(Increase) / Decrease in Inventories', inventoryChange, true)}
            {row('Increase / (Decrease) in Trade Payables', creditorsChange, true)}
            {row('Increase / (Decrease) in GST Payable (net)', gstChange, true)}
            {row('Cash Generated from Operations', cfo, false, true)}
            {row('Less: Income Tax Paid', -taxPaid, true)}
            {row('Net Cash from Operating Activities (A)', netCFO, false, true)}

            <tr className="group"><td colSpan="2">B. CASH FLOW FROM INVESTING ACTIVITIES</td></tr>
            {row('Purchase of PPE (net)', ppeChange, true)}
            {row('Purchase / (Sale) of Investments', investChange, true)}
            {row('Interest Received', interestInc, true)}
            {row('Net Cash from Investing Activities (B)', netCFI, false, true)}

            <tr className="group"><td colSpan="2">C. CASH FLOW FROM FINANCING ACTIVITIES</td></tr>
            {row('Proceeds from / (Repayment of) Borrowings', borrowingChange, true)}
            {row('Proceeds from Share Capital Issue', capitalChange, true)}
            {row('Less: Interest Paid', -interestExp, true)}
            {row('Net Cash from Financing Activities (C)', netCFF, false, true)}

            <tr className="total"><td>NET INCREASE / (DECREASE) IN CASH (A+B+C)</td><td className="num">₹{fmt(netChange)}</td></tr>
            {row('Cash & Equivalents at Beginning of Period', openingCash)}
            {row('Cash & Equivalents at End of Period', closingCash, false, true)}

            <tr><td colSpan="2" style={{textAlign:'center', padding:14}}>
              {Math.abs(closingCash - actualClosingCash) < 1 ? <span className="badge badge-success">✓ Reconciled with Balance Sheet</span> : <span className="badge badge-gold">Difference: ₹{fmt(closingCash - actualClosingCash)} — check non-trade items</span>}
            </td></tr>
          </tbody>
        </table>

        <div className="report-foot">
          <span>Prepared under AS-3 (Indirect Method) · Forex gains/losses are unrealised unless on monetary items at year-end</span>
          <span>MiyeeBooks · For {data.company.name}</span>
        </div>
      </div>
    </>
  );
}
