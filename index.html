<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#f4f7f5;
    --surface:#ffffff;
    --surface-2:#f9fbf9;
    --ink:#0e2a23;
    --ink-2:#3a4f49;
    --ink-3:#6b7f78;
    --line:#e3ebe7;
    --line-2:#cfdbd5;
    --primary:#0b6b4f;     /* MYeeCFO deep green */
    --primary-2:#0e8a66;
    --primary-soft:#e6f3ee;
    --accent:#c9a227;       /* gold */
    --accent-soft:#fbf3d9;
    --danger:#b3261e;
    --danger-soft:#fbe9e7;
    --warning:#a36a00;
    --info:#1a5fb4;
    --info-soft:#e6eef9;
    --radius:10px;
    --radius-sm:6px;
    --shadow-sm:0 1px 2px rgba(14,42,35,.06), 0 1px 3px rgba(14,42,35,.04);
    --shadow:0 4px 12px rgba(14,42,35,.07), 0 2px 4px rgba(14,42,35,.05);
    --mono:'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --serif:'Cormorant Garamond', Georgia, serif;
    --sans:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:13px}
  /* Top bar */
  .topbar{background:var(--ink);color:#e8efec;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #0a1f1a}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand-mark{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.5px;color:#fff}
  .brand-mark .dot{color:var(--accent)}
  .brand-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#8aa098;border-left:1px solid #2a4039;padding-left:10px}
  .topbar-right{display:flex;gap:14px;align-items:center;font-size:12px;color:#b5c5be}
  .topbar-right .pill{background:#10342c;padding:4px 10px;border-radius:20px;color:#b5d4c8;font-size:11px}
  /* Layout */
  .app{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 45px)}
  .sidebar{background:var(--surface);border-right:1px solid var(--line);padding:18px 0;overflow-y:auto}
  .nav-section{padding:0 14px;margin-bottom:8px}
  .nav-section-title{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:8px 8px 4px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:var(--radius-sm);color:var(--ink-2);font-size:12.5px;font-weight:500;cursor:pointer;margin-bottom:1px}
  .nav-item:hover{background:var(--surface-2);color:var(--ink)}
  .nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
  .nav-item .ico{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
  .main{padding:22px 28px;overflow-x:auto}
  /* Page header */
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--line)}
  .page-title{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--ink);margin:0;letter-spacing:-.5px}
  .page-sub{color:var(--ink-3);font-size:12px;margin-top:2px}
  .page-actions{display:flex;gap:8px}
  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);transition:all .12s}
  .btn:hover{border-color:var(--ink-3);color:var(--ink)}
  .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn-primary:hover{background:var(--primary-2);border-color:var(--primary-2);color:#fff}
  .btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-ghost{background:transparent;border-color:transparent}
  .btn-ghost:hover{background:var(--surface-2)}
  .btn-danger{color:var(--danger);border-color:var(--line-2)}
  .btn-danger:hover{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
  .btn-sm{padding:4px 9px;font-size:11px}
  /* Cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .card-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .card-title{font-weight:600;font-size:14px;color:var(--ink);margin:0;font-family:var(--serif);font-size:17px}
  .card-body{padding:18px}
  /* Stats grid */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:22px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
  .stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary)}
  .stat.stat-gold::before{background:var(--accent)}
  .stat.stat-info::before{background:var(--info)}
  .stat.stat-danger::before{background:var(--danger)}
  .stat-label{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin-bottom:6px}
  .stat-value{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--ink);letter-spacing:-.3px}
  .stat-delta{font-size:11px;margin-top:4px;color:var(--ink-3)}
  .stat-delta.up{color:var(--primary-2)}
  .stat-delta.down{color:var(--danger)}
  /* Table */
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{background:var(--surface-2);text-align:left;padding:9px 12px;font-weight:600;color:var(--ink-2);border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.5px;text-transform:uppercase}
  td{padding:9px 12px;border-bottom:1px solid var(--line);color:var(--ink-2)}
  tr:hover td{background:var(--surface-2)}
  tr:last-child td{border-bottom:none}
  td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
  td.actions{text-align:right}
  td.bold,tr.total td{font-weight:600;color:var(--ink)}
  tr.total{background:var(--primary-soft) !important}
  tr.total td{background:var(--primary-soft);border-top:2px solid var(--primary);border-bottom:2px solid var(--primary);color:var(--primary)}
  tr.subtotal td{font-weight:600;background:var(--surface-2);color:var(--ink)}
  tr.group td{background:var(--ink);color:#fff;font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;padding:7px 12px}
  /* Forms */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:600;color:var(--ink-2);text-transform:uppercase;letter-spacing:.5px}
  .field input, .field select, .field textarea{padding:8px 10px;border:1px solid var(--line-2);border-radius:var(--radius-sm);background:var(--surface);color:var(--ink);outline:none;transition:border-color .12s}
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--primary)}
  .field.required label::after{content:' *';color:var(--danger)}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(14,42,35,.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(2px)}
  .modal{background:var(--surface);border-radius:var(--radius);box-shadow:0 20px 50px rgba(14,42,35,.25);width:100%;max-width:760px;border:1px solid var(--line)}
  .modal.wide{max-width:1100px}
  .modal-head{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--ink);margin:0}
  .modal-body{padding:22px}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;background:var(--surface-2);border-radius:0 0 var(--radius) var(--radius)}
  /* Tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .tab{padding:9px 16px;font-size:12.5px;font-weight:500;color:var(--ink-3);border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px}
  .tab:hover{color:var(--ink-2)}
  .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
  /* Badges */
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .badge-success{background:var(--primary-soft);color:var(--primary)}
  .badge-gold{background:var(--accent-soft);color:var(--warning)}
  .badge-info{background:var(--info-soft);color:var(--info)}
  .badge-danger{background:var(--danger-soft);color:var(--danger)}
  .badge-muted{background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line)}
  /* Filter bar */
  .filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;padding:14px 18px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px}
  .filter-bar .field{min-width:140px}
  /* Voucher line items */
  .lines-table{width:100%;border-collapse:collapse;margin-top:8px}
  .lines-table th{font-size:10.5px;padding:6px 8px}
  .lines-table td{padding:4px 4px;border-bottom:1px solid var(--line)}
  .lines-table input, .lines-table select{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:4px;font-size:12px}
  .lines-table .row-del{color:var(--danger);cursor:pointer;padding:4px}
  /* Empty state */
  .empty{text-align:center;padding:50px 20px;color:var(--ink-3)}
  .empty .empty-ico{font-size:36px;margin-bottom:10px;opacity:.4}
  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:var(--radius);box-shadow:var(--shadow);z-index:200;font-size:13px;display:flex;align-items:center;gap:10px;animation:slideUp .2s ease}
  .toast.success{background:var(--primary)}
  .toast.error{background:var(--danger)}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  /* Print/report styling */
  .report{background:#fff;padding:30px;border:1px solid var(--line);border-radius:var(--radius)}
  .report-head{text-align:center;border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:18px}
  .report-head .report-logo{display:block;margin:0 auto 8px;max-height:48px;max-width:160px;object-fit:contain}
  .report-co{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--ink)}
  .report-title{font-size:14px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-2);margin-top:4px}
  .report-period{font-size:11px;color:var(--ink-3);margin-top:3px}
  .report-foot{margin-top:24px;padding-top:14px;border-top:1px solid var(--line);font-size:10.5px;color:var(--ink-3);display:flex;justify-content:space-between}
  /* Tag/chip */
  .chip-list{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-size:11px;padding:3px 9px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;color:var(--ink-2)}
  /* Responsive */
  @media (max-width:900px){
    .app{grid-template-columns:1fr}
    .sidebar{display:none}
  }
  /* Custom scrollbar */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-3)}
  /* Indian rupee */
  .rupee{font-family:var(--mono)}
  .neg{color:var(--danger)}
  .pos{color:var(--primary)}
  /* Footer credit */
  .credit{text-align:center;padding:18px 20px 14px;font-size:10.5px;color:var(--ink-3);border-top:2px solid var(--line);background:var(--surface-2);letter-spacing:.5px;line-height:1.9}
  .credit b{color:var(--ink-2);font-weight:600}
  .credit .contact-row{display:flex;justify-content:center;align-items:center;gap:18px;flex-wrap:wrap;margin-top:6px;font-size:11px;color:var(--ink-2)}
  .credit .contact-row a{color:var(--primary);text-decoration:none;font-weight:500}
  .credit .contact-row a:hover{text-decoration:underline}
  .credit .contact-sep{color:var(--line-2)}
  /* Section divider */
  .section-divider{display:flex;align-items:center;gap:12px;margin:18px 0 12px}
  .section-divider .line{flex:1;height:1px;background:var(--line)}
  .section-divider .label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-3);font-weight:600}
  /* Voucher quick buttons */
  .voucher-types{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
  .vt-btn{padding:14px 12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);text-align:left;transition:all .15s}
  .vt-btn:hover{border-color:var(--primary);background:var(--primary-soft);transform:translateY(-1px);box-shadow:var(--shadow)}
  .vt-btn .vt-icon{font-size:18px;margin-bottom:6px;color:var(--primary)}
  .vt-btn .vt-name{font-weight:600;font-size:12.5px;color:var(--ink)}
  .vt-btn .vt-desc{font-size:11px;color:var(--ink-3);margin-top:2px}
  /* Help text */
  .help{font-size:11px;color:var(--ink-3);margin-top:4px;font-style:italic}
  /* Progress/sync animation */
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .syncing{animation:pulse 1.2s ease infinite}
  /* Ratio gauge */
  .gauge-track{height:8px;background:var(--line);border-radius:4px;overflow:hidden}
  .gauge-fill{height:100%;border-radius:4px;transition:width .4s ease}
  /* MIS waterfall */
  .waterfall-bar{height:24px;border-radius:3px;min-width:2px;transition:width .3s}
  /* Code block */
  code{background:var(--surface-2);padding:2px 6px;border-radius:3px;font-family:var(--mono);font-size:11px}
  a{color:var(--primary);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ── Auth Screen ─────────────────────────────────────────────────────── */
  .auth-bg{min-height:100vh;background:linear-gradient(145deg,#0b6b4f 0%,#063d2d 60%,#021a12 100%);display:flex;align-items:center;justify-content:center;padding:20px}
  .auth-card{background:var(--surface);border-radius:18px;padding:36px 32px 28px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
  .auth-brand{display:flex;align-items:center;gap:14px;margin-bottom:28px}
  .auth-logo{width:52px;height:52px;background:var(--primary);border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:30px;font-weight:700;color:#fff;position:relative;flex-shrink:0}
  .auth-logo-dot{position:absolute;top:5px;right:5px;width:11px;height:11px;background:var(--accent);border-radius:50%}
  .auth-brand-name{font-size:22px;font-weight:700;color:var(--ink)}
  .auth-brand-tag{font-size:10.5px;color:var(--ink-3);letter-spacing:1.2px;text-transform:uppercase;margin-top:1px}
  .auth-tabs{display:flex;background:var(--surface-2);border-radius:9px;padding:4px;margin-bottom:22px;border:1px solid var(--line);gap:3px}
  .auth-tab{flex:1;border:none;background:transparent;padding:8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--ink-3);cursor:pointer;transition:all .15s}
  .auth-tab.active{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .auth-form{display:flex;flex-direction:column;gap:14px}
  .auth-field{display:flex;flex-direction:column;gap:5px}
  .auth-field label{font-size:12px;font-weight:600;color:var(--ink-2);letter-spacing:.3px}
  .auth-field input{padding:10px 12px;border:1.5px solid var(--line-2);border-radius:8px;font-size:14px;background:var(--surface);color:var(--ink);transition:border-color .15s;outline:none;width:100%;box-sizing:border-box}
  .auth-field input:focus{border-color:var(--primary)}
  .auth-error{background:#fef2f2;color:var(--danger);border:1px solid #fecaca;border-radius:7px;padding:9px 12px;font-size:12.5px}
  .auth-btn-primary{background:var(--primary);color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;width:100%}
  .auth-btn-primary:hover{background:var(--primary-2)}
  .auth-btn-primary:disabled{opacity:.6;cursor:not-allowed}
  .auth-btn-secondary{background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:9px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
  .auth-btn-secondary:hover{background:var(--primary-soft)}
  .auth-btn-link{background:none;border:none;color:var(--ink-3);font-size:12.5px;cursor:pointer;padding:4px 0;display:block;width:100%;text-align:center;margin-top:4px}
  .auth-btn-link:hover{color:var(--primary)}
  .auth-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--ink-3);font-size:12px}
  .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--line)}
  .auth-btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px 14px;background:var(--surface);border:1.5px solid var(--line-2);border-radius:9px;font-size:13.5px;font-weight:500;color:var(--ink);cursor:pointer;transition:all .15s}
  .auth-btn-google:hover{border-color:var(--primary);background:var(--primary-soft)}
  .auth-btn-google:disabled{opacity:.6;cursor:not-allowed}
  .auth-footer{text-align:center;margin-top:20px;font-size:11px;color:var(--ink-3);line-height:1.7}
  /* Company Selector */
  .company-card{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border:1.5px solid var(--line);border-radius:10px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
  .company-card:hover{border-color:var(--primary);background:var(--primary-soft)}

const fmt = (n, dec=2) => {
  if(n===null||n===undefined||isNaN(n))return '0.00';
  const num = Number(n);
  const sign = num < 0 ? '-' : '';
  const abs = Math.abs(num);
  // Indian number format
  const parts = abs.toFixed(dec).split('.');
  let intPart = parts[0];
  let lastThree = intPart.substring(intPart.length-3);
  let otherNums = intPart.substring(0, intPart.length-3);
  if(otherNums !== '') lastThree = ',' + lastThree;
  const formatted = otherNums.replace(/\B(?=(\d{2})+(?!\d))/g, ',') + lastThree;
  return sign + formatted + (dec>0 ? '.' + parts[1] : '');
};

const calcPTMonthly = (employee, month, fyStart) => {
  const ptRate = employee.ptAmount != null ? employee.ptAmount : 200;
  if(ptRate === 0) return 0;
  if(employee.doj){
    const dojDate = new Date(employee.doj);
    const payMonthEnd = new Date(parseInt(month.slice(0,4)), parseInt(month.slice(5,7)), 0);
    if(dojDate > payMonthEnd) return 0;
  }
  return ptRate;
};

// Annual PT: if DOJ <= FY start → 12 months. If mid-FY → count from DOJ month to March.
const calcPTAnnual = (employee, fyStart) => {
  const ptRate = employee.ptAmount != null ? employee.ptAmount : 200;
  if(ptRate === 0) return 0;
  const fyStartYear = parseInt((fyStart||'2025-04-01').slice(0,4));
  const fyStartDate = new Date(fyStartYear, 3, 1);   // 01-Apr-YYYY
  const fyEndDate   = new Date(fyStartYear+1, 2, 31); // 31-Mar-YYYY+1

  let countFrom = new Date(fyStartDate); // default: full FY from April
  if(employee.doj){
    const doj = new Date(employee.doj);
    if(doj > fyEndDate) return 0;            // joins after this FY
    if(doj > fyStartDate) countFrom = new Date(doj.getFullYear(), doj.getMonth(), 1); // mid-FY join
    // if doj <= fyStartDate → full year (countFrom stays April)
  }
  let months = 0;
  let d = new Date(countFrom.getFullYear(), countFrom.getMonth(), 1);
  while(d <= fyEndDate){ months++; d.setMonth(d.getMonth()+1); }
  return months * ptRate;
};

const parseCSV = (text) => {
  const lines = text.trim().split(/\r?\n/);
  if(lines.length < 2) return { headers: [], rows: [] };
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  const rows = lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for(let i = 0; i < line.length; i++){
      const ch = line[i];
      if(ch === '"'){ inQ = !inQ; continue; }
      if(ch === ',' && !inQ){ cols.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => { obj[h] = (cols[i]||'').replace(/^"|"$/g,'').trim(); });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== ''));
  return { headers, rows };
};

const downloadCSV = (filename, csvText) => {

  URL.revokeObjectURL(url);
};

const numberToWords = (num) => {
  if(num === 0) return 'Zero';
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  
  const convertGroup = (n) => {
    if(n === 0) return '';
    if(n < 20) return ones[n];
    if(n < 100) return tens[Math.floor(n/10)] + (n%10 ? ' ' + ones[n%10] : '');
    return ones[Math.floor(n/100)] + ' Hundred' + (n%100 ? ' and ' + convertGroup(n%100) : '');
  };
  
  const intPart = Math.floor(Math.abs(num));
  const decPart = Math.round((Math.abs(num) - intPart) * 100);
  let n = intPart;
  let group0 = n % 1000; n = Math.floor(n/1000);
  let group1 = n % 100; n = Math.floor(n/100);
  let group2 = n % 100; n = Math.floor(n/100);
  let group3 = n;
  
  let result = '';
  if(group3) result += convertGroup(group3) + ' Crore ';
  if(group2) result += convertGroup(group2) + ' Lakh ';
  if(group1) result += convertGroup(group1) + ' Thousand ';
  if(group0) result += convertGroup(group0);
  result = result.trim() || 'Zero';
  if(decPart > 0) result += ' and ' + convertGroup(decPart) + ' Paise';
  return 'Indian Rupees ' + result + ' Only';
};

function LoginScreen({ onLogin }){
  const [tab, setTab]           = useState('login');
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [name, setName]         = useState('');
  const [showPw, setShowPw]     = useState(false);
  const [loading, setLoading]   = useState(false);
  const [gLoading, setGLoading] = useState(false);
  const [error, setError]       = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      let cred;
      if(tab === 'login'){
        cred = await fbAuth.signInWithEmailAndPassword(email, password);
      } else {
        cred = await fbAuth.createUserWithEmailAndPassword(email, password);
        if(name.trim()) await cred.user.updateProfile({ displayName: name.trim() });
      }
      onLogin(cred.user);
    } catch(err){
      setError(fbErrMsg(err.code));
    } finally { setLoading(false); }
  };

  const handleGoogle = async () => {
    setGLoading(true); setError('');
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred = await fbAuth.signInWithPopup(provider);
      onLogin(cred.user);
    } catch(err){
      const msg = fbErrMsg(err.code);
      if(msg) setError(msg);
    } finally { setGLoading(false); }
  };

  const switchTab = (t) => { setTab(t); setError(''); setEmail(''); setPassword(''); setName(''); setShowPw(false); };

      background:'#0b6b4f', display:'flex', alignItems:'center', justifyContent:'center',
    },
    logoText:{ fontFamily:'Georgia,serif', fontSize:32, fontWeight:700, color:'#fff', lineHeight:1 },
    logoDot:{
      position:'absolute', top:6, right:6, width:11, height:11,
      borderRadius:'50%', background:'#c9a227',
    },
    brandName:{ fontSize:24, fontWeight:700, color:'#0e2a23', letterSpacing:'-.3px' },
    brandAccent:{ color:'#c9a227' },
    brandTag:{ fontSize:10, letterSpacing:'1.5px', textTransform:'uppercase', color:'#6b7f78', marginTop:2 },
    /* tab switcher */
    tabBar:{
      display:'flex', background:'#f4f7f5', borderRadius:10, padding:4,
      marginBottom:24, border:'1px solid #e3ebe7', gap:4,
    },
    tab:(active)=>({
      flex:1, border:'none', cursor:'pointer', padding:'9px 0', borderRadius:7,
      fontSize:13, fontWeight: active?600:500, transition:'all .15s',
      background: active?'#ffffff':'transparent',
      color: active?'#0e2a23':'#6b7f78',
      boxShadow: active?'0 1px 4px rgba(0,0,0,.12)':'none',
    }),
    /* form */
    form:{ display:'flex', flexDirection:'column', gap:16 },
    fieldWrap:{ display:'flex', flexDirection:'column', gap:6 },
    label:{ fontSize:12, fontWeight:600, color:'#3a4f49', letterSpacing:'.2px' },
    inputWrap:{ position:'relative' },
    input:{
      width:'100%', boxSizing:'border-box', padding:'11px 14px',
      border:'1.5px solid #cfdbd5', borderRadius:9, fontSize:14,
      background:'#ffffff', color:'#0e2a23', outline:'none',
      transition:'border-color .15s', fontFamily:'inherit',
    },
    inputFocus:{ borderColor:'#0b6b4f' },
    pwEye:{
      position:'absolute', right:12, top:'50%', transform:'translateY(-50%)',
      background:'none', border:'none', cursor:'pointer', color:'#6b7f78', fontSize:15, padding:0,
    },
    /* primary button */
    btnPrimary:(disabled)=>({
      width:'100%', border:'none', borderRadius:10, padding:'13px',
      fontSize:14, fontWeight:700, cursor: disabled?'not-allowed':'pointer',
      background: disabled?'#8fb5a8':'#0b6b4f', color:'#ffffff',
      transition:'background .15s', letterSpacing:'.2px', marginTop:2,
    }),
    /* google button */
    btnGoogle:{
      display:'flex', alignItems:'center', justifyContent:'center', gap:10,
      width:'100%', padding:'12px 14px', background:'#ffffff',
      border:'1.5px solid #cfdbd5', borderRadius:10, fontSize:13.5,
      fontWeight:500, color:'#0e2a23', cursor:'pointer', transition:'all .15s',
      fontFamily:'inherit', marginBottom:4,
    },
    /* error */
    errBox:{
      background:'#fef2f2', color:'#b3261e', border:'1px solid #f5c6c4',
      borderRadius:8, padding:'10px 13px', fontSize:12.5, lineHeight:1.5,
    },
    /* divider */
    divider:{
      display:'flex', alignItems:'center', gap:12,
      margin:'20px 0', color:'#8aa098', fontSize:12,
    },
    dividerLine:{ flex:1, height:1, background:'#e3ebe7' },
    /* footer */
    footer:{
      textAlign:'center', marginTop:22, fontSize:11,
      color:'#6b7f78', lineHeight:1.8,
    },
  };

  /* focus effect via state */
  const [focused, setFocused] = useState('');

  return (
    <div style={S.page}>
      <div style={S.card}>

        {/* ── Brand ── */}
        <div style={S.brandRow}>
          <div style={S.logoBox}>
            <span style={S.logoText}>M</span>
            <div style={S.logoDot}/>
          </div>
          <div>
            <div style={S.brandName}>
              Miyee<span style={S.brandAccent}>·</span>Books
            </div>
            <div style={S.brandTag}>MSME Accounting Suite</div>
          </div>
        </div>

        {/* ── Tab switcher ── */}
        <div style={S.tabBar}>
          <button style={S.tab(tab==='login')}    onClick={()=>switchTab('login')}>Sign In</button>
          <button style={S.tab(tab==='register')} onClick={()=>switchTab('register')}>Create Account</button>
        </div>

        {/* ── Form ── */}
        <form style={S.form} onSubmit={handleSubmit}>
          {tab==='register' && (
            <div style={S.fieldWrap}>
              <label style={S.label}>Full Name</label>
              <input style={{...S.input, ...(focused==='name'?S.inputFocus:{})}}
                value={name} onChange={e=>setName(e.target.value)}
                onFocus={()=>setFocused('name')} onBlur={()=>setFocused('')}
                placeholder="Your name" autoFocus />
            </div>
          )}
          <div style={S.fieldWrap}>
            <label style={S.label}>Email Address</label>
            <input style={{...S.input, ...(focused==='email'?S.inputFocus:{})}}
              type="email" value={email} onChange={e=>setEmail(e.target.value)}
              onFocus={()=>setFocused('email')} onBlur={()=>setFocused('')}
              placeholder="you@company.com" required
              autoFocus={tab==='login'} />
          </div>
          <div style={S.fieldWrap}>
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <label style={S.label}>Password</label>
              {tab==='login' && (
                <span style={{fontSize:11, color:'#6b7f78', cursor:'default'}}>
                  6+ characters
                </span>
              )}
            </div>
            <div style={S.inputWrap}>
              <input style={{...S.input, paddingRight:42, ...(focused==='pw'?S.inputFocus:{})}}
                type={showPw?'text':'password'} value={password}
                onChange={e=>setPassword(e.target.value)}
                onFocus={()=>setFocused('pw')} onBlur={()=>setFocused('')}
                placeholder={tab==='register'?'Minimum 6 characters':'Your password'}
                required minLength="6" />
              <button type="button" style={S.pwEye} onClick={()=>setShowPw(p=>!p)}
                title={showPw?'Hide password':'Show password'}>
                {showPw ? '🙈' : '👁'}
              </button>
            </div>
          </div>

          {error && (
            <div style={S.errBox}>⚠ {error}</div>
          )}

          <button type="submit" style={S.btnPrimary(loading)} disabled={loading}>
            {loading
              ? <span>⏳ {tab==='login'?'Signing in…':'Creating account…'}</span>
              : tab==='login' ? '→ Sign In' : '✓ Create Account'
            }
          </button>
        </form>

        {/* ── Divider ── */}
        <div style={S.divider}>
          <div style={S.dividerLine}/><span>or continue with</span><div style={S.dividerLine}/>
        </div>

        {/* ── Google button ── */}
        <button style={S.btnGoogle} onClick={handleGoogle} disabled={gLoading}
          onMouseEnter={e=>{ e.currentTarget.style.borderColor='#0b6b4f'; e.currentTarget.style.background='#e6f3ee'; }}
          onMouseLeave={e=>{ e.currentTarget.style.borderColor='#cfdbd5'; e.currentTarget.style.background='#ffffff'; }}>
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          {gLoading ? '⏳ Signing in…' : 'Continue with Google'}

        {/* ── Footer ── */}
        <div style={S.footer}>
          🔒 Your data is private — only you can access it<br/>
          Secured by <b style={{color:'#3a4f49'}}>Firebase Authentication</b> &amp; <b style={{color:'#3a4f49'}}>Firestore</b>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// COMPANY SELECTOR
// ============================================================================
function CompanySelector({ user, onSelect, onSignOut }){
  const [companies,  setCompanies]  = useState(null);   // owned
  const [shared,     setShared]     = useState([]);      // shared with me
  const [creating,   setCreating]   = useState(false);
  const [deleting,   setDeleting]   = useState(null);
  const [newName,    setNewName]    = useState('');
  const [newGstin,   setNewGstin]   = useState('');
  const [error,      setError]      = useState('');
  const [loading,    setLoading]    = useState(false);
  const [focusedF,   setFocusedF]   = useState('');
  const [inviteCode, setInviteCode] = useState('');
  const [showInvBox, setShowInvBox] = useState(false);
  const [invLoading, setInvLoading] = useState(false);
  const [invError,   setInvError]   = useState('');

  const PAGE_BG = 'linear-gradient(145deg, #0b6b4f 0%, #063d2d 55%, #021a12 100%)';
  const FONT    = '"Inter", -apple-system, BlinkMacSystemFont, sans-serif';
  const inp = (focused) => ({
    width:'100%', boxSizing:'border-box', padding:'10px 13px',
    border: focused?'1.5px solid #0b6b4f':'1.5px solid #cfdbd5',
    borderRadius:8, fontSize:14, background:'#fff', color:'#0e2a23',
    outline:'none', fontFamily:FONT, marginTop:5, display:'block',
  });
  const ROLE_CLR = { admin:'#1976d2', limited:'#f57c00', viewer:'#757575' };
  const ROLE_LBL = { admin:'Admin', limited:'Limited', viewer:'Viewer' };

  const load = () => {
    Promise.all([
      fbListCompanies(user.uid),
      fbListSharedCompanies(user.uid),
    ]).then(([owned, sh]) => {
      setCompanies(owned);
      setShared(sh);
      if(owned.length + sh.length === 1){
        if(owned.length === 1) onSelect(owned[0].id, user.uid, 'owner');
        else onSelect(sh[0].companyId, sh[0].ownerId, sh[0].role);
      }
    }).catch(() => { setCompanies([]); setShared([]); });
  };
  useEffect(load, [user.uid]);

  const handleCreate = async (e) => {
    e.preventDefault();
    if(!newName.trim()){ setError('Business name is required.'); return; }
    setLoading(true); setError('');
    try {
      const id = await fbCreateCompany(user.uid,
        buildDefaultData({ name: newName.trim(), gstin: newGstin.trim().toUpperCase() }));
      onSelect(id, user.uid, 'owner');
    } catch(err){
      setError('Failed to create company. Please try again.');
      setLoading(false);
    }
  };

  const handleDelete = async (id) => {
    if(!confirm('Delete this company and ALL its data? This cannot be undone.')) return;
    setDeleting(id);
    try { await fbDeleteCompany(user.uid, id); load(); }
    catch(e){ alert('Delete failed.'); }
    finally { setDeleting(null); }
  };

  const handleAcceptInvite = async (e) => {
    e.preventDefault();
    if(!inviteCode.trim()){ setInvError('Enter an invite code.'); return; }
    setInvLoading(true); setInvError('');
    try {
      await fbAcceptInvite(inviteCode.trim(), user.uid);
      setInviteCode(''); setShowInvBox(false);
      load();
    } catch(err){
      setInvError(err.message);
    } finally { setInvLoading(false); }
  };

  const LoadingScreen = () => (
    <div style={{minHeight:'100vh',width:'100vw',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:18,background:PAGE_BG,fontFamily:FONT}}>
      <div style={{width:40,height:40,border:'3px solid rgba(255,255,255,.25)',borderTopColor:'#fff',
        borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
      <div style={{color:'rgba(255,255,255,.8)',fontSize:14}}>Loading your companies…</div>
    </div>
  );

  if(companies === null) return <LoadingScreen />;

  const CompanyBtn = ({ c, onClick, onDel, showDel, role }) => (
    <div style={{position:'relative'}}>
      <button onClick={onClick}
        style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          width:'100%',padding:'13px 46px 13px 16px',background:'#fff',
          border:'1.5px solid #e3ebe7',borderRadius:12,cursor:'pointer',
          textAlign:'left',boxSizing:'border-box',fontFamily:FONT,transition:'all .15s'}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor='#0b6b4f';e.currentTarget.style.background='#e6f3ee';}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor='#e3ebe7';e.currentTarget.style.background='#fff';}}>
        <div>
          <div style={{fontWeight:700,fontSize:14,color:'#0e2a23'}}>{c.name||c.companyName}</div>
          {c.gstin && <div style={{fontSize:11,color:'#6b7f78',fontFamily:'monospace',marginTop:2}}>{c.gstin}</div>}
          {role && role !== 'owner' && (
            <span style={{fontSize:10,background:ROLE_CLR[role]+'22',color:ROLE_CLR[role],borderRadius:20,padding:'2px 8px',fontWeight:700,display:'inline-block',marginTop:4}}>
              {ROLE_LBL[role]||role}
            </span>
          )}
        </div>
        <span style={{color:'#0b6b4f',fontSize:18,flexShrink:0}}>→</span>
      </button>
      {showDel && (
        <button onClick={onDel} title="Delete company"
          style={{position:'absolute',top:'50%',right:12,transform:'translateY(-50%)',
            background:'none',border:'none',cursor:'pointer',fontSize:15,padding:'4px',
            color:'#b3261e',opacity:.5,lineHeight:1}}
          onMouseEnter={e=>e.currentTarget.style.opacity=1}
          onMouseLeave={e=>e.currentTarget.style.opacity=.5}>🗑</button>
      )}
    </div>
  );

  return (
    <div style={{minHeight:'100vh',width:'100vw',display:'flex',alignItems:'center',
      justifyContent:'center',background:PAGE_BG,fontFamily:FONT,padding:20,boxSizing:'border-box'}}>
      <div style={{background:'#fff',borderRadius:20,padding:'32px 28px 24px',width:'100%',maxWidth:480,
        boxShadow:'0 32px 80px rgba(0,0,0,.4)',boxSizing:'border-box',maxHeight:'90vh',overflowY:'auto'}}>

        {/* header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24}}>
          <div>
            <div style={{fontSize:20,fontWeight:700,color:'#0e2a23',letterSpacing:'-.3px'}}>🏢 Select Company</div>
            <div style={{fontSize:12,color:'#6b7f78',marginTop:4}}>
              Signed in as <b style={{color:'#3a4f49'}}>{user.displayName||user.email}</b>
            </div>
          </div>
          <button onClick={onSignOut} style={{background:'none',border:'1px solid #cfdbd5',borderRadius:7,
            padding:'6px 12px',fontSize:12,color:'#6b7f78',cursor:'pointer',fontFamily:FONT,whiteSpace:'nowrap',flexShrink:0}}>
            ↩ Sign out
          </button>
        </div>

        {/* My companies */}
        {companies.length > 0 && (
          <>
            <div style={{fontSize:11,fontWeight:700,color:'#6b7f78',letterSpacing:'.8px',textTransform:'uppercase',marginBottom:8}}>My Companies</div>
            <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:16}}>
              {companies.map(c => (
                <CompanyBtn key={c.id} c={c} role="owner"
                  onClick={()=>onSelect(c.id, user.uid, 'owner')}
                  onDel={()=>handleDelete(c.id)}
                  showDel={deleting !== c.id} />
              ))}
            </div>
          </>
        )}
        {companies.length === 0 && shared.length === 0 && (
          <div style={{textAlign:'center',padding:'24px 0 20px',color:'#6b7f78',fontSize:13}}>
            No companies yet — create your first one below ↓
          </div>
        )}

        {/* Shared with me */}
        {shared.length > 0 && (
          <>
            <div style={{fontSize:11,fontWeight:700,color:'#6b7f78',letterSpacing:'.8px',textTransform:'uppercase',marginBottom:8,marginTop:companies.length>0?4:0}}>Shared With Me</div>
            <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:16}}>
              {shared.map(s => (
                <CompanyBtn key={s.id} c={{name:s.companyName}} role={s.role}
                  onClick={()=>onSelect(s.companyId, s.ownerId, s.role)}
                  showDel={false} />
              ))}
            </div>
          </>
        )}

        {/* Add company */}
        {!creating ? (
          <button onClick={()=>setCreating(true)}
            style={{width:'100%',background:'transparent',border:'1.5px dashed #0b6b4f',
              borderRadius:10,padding:'11px',fontSize:13,fontWeight:600,
              color:'#0b6b4f',cursor:'pointer',fontFamily:FONT,transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='#e6f3ee';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';}}>
            + Add New Company / Firm
          </button>
        ) : (
          <form onSubmit={handleCreate}
            style={{background:'#f9fbf9',borderRadius:12,padding:'18px 16px',border:'1px solid #e3ebe7'}}>
            <div style={{fontSize:13,fontWeight:700,color:'#0e2a23',marginBottom:14}}>➕ New Company / Firm</div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,fontWeight:600,color:'#3a4f49'}}>Business Name *</label>
              <input value={newName} onChange={e=>setNewName(e.target.value)}
                onFocus={()=>setFocusedF('name')} onBlur={()=>setFocusedF('')}
                style={inp(focusedF==='name')} placeholder="e.g. Rajesh Traders Pvt Ltd" autoFocus />
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,fontWeight:600,color:'#3a4f49'}}>GSTIN <span style={{fontWeight:400,color:'#6b7f78'}}>(optional)</span></label>
              <input value={newGstin} onChange={e=>setNewGstin(e.target.value.toUpperCase())}
                onFocus={()=>setFocusedF('gstin')} onBlur={()=>setFocusedF('')}
                style={{...inp(focusedF==='gstin'),fontFamily:'monospace',letterSpacing:'.5px'}}
                placeholder="22AAAAA0000A1Z5" maxLength={15} />
            </div>
            {error && <div style={{background:'#fef2f2',color:'#b3261e',borderRadius:7,padding:'9px 12px',fontSize:12,marginBottom:12}}>⚠ {error}</div>}
            <div style={{display:'flex',gap:8}}>
              <button type="submit" disabled={loading}
                style={{flex:1,background:loading?'#8fb5a8':'#0b6b4f',color:'#fff',border:'none',
                  borderRadius:9,padding:'11px',fontSize:13,fontWeight:600,cursor:loading?'not-allowed':'pointer',fontFamily:FONT}}>
                {loading?'Creating…':'✓ Create & Open'}
              </button>
              <button type="button" onClick={()=>{setCreating(false);setError('');}}
                style={{background:'#fff',color:'#3a4f49',border:'1.5px solid #cfdbd5',
                  borderRadius:9,padding:'11px 16px',fontSize:13,cursor:'pointer',fontFamily:FONT}}>
                Cancel
              </button>
            </div>
          </form>
        )}

        {/* Invite code entry */}
        <div style={{marginTop:16,borderTop:'1px solid #e3ebe7',paddingTop:14}}>
          {!showInvBox ? (
            <button onClick={()=>setShowInvBox(true)}
              style={{background:'none',border:'none',color:'#6b7f78',fontSize:12,cursor:'pointer',fontFamily:FONT,padding:0,textDecoration:'underline'}}>
              🔑 Have an invite code? Enter it here
            </button>
          ) : (
            <form onSubmit={handleAcceptInvite}>
              <div style={{fontSize:12,fontWeight:600,color:'#3a4f49',marginBottom:6}}>🔑 Enter Invite Code</div>
              <div style={{display:'flex',gap:8}}>
                <input value={inviteCode} onChange={e=>setInviteCode(e.target.value.toUpperCase())}
                  placeholder="e.g. AB3DE7FG" maxLength={8}
                  style={{...inp(true),marginTop:0,flex:1,fontFamily:'monospace',fontSize:16,letterSpacing:2,fontWeight:700}}
                  autoFocus />
                <button type="submit" disabled={invLoading}
                  style={{background:invLoading?'#8fb5a8':'#0b6b4f',color:'#fff',border:'none',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,cursor:invLoading?'not-allowed':'pointer',fontFamily:FONT,whiteSpace:'nowrap'}}>
                  {invLoading?'…':'Join'}
                </button>
                <button type="button" onClick={()=>{setShowInvBox(false);setInviteCode('');setInvError('');}}
                  style={{background:'#fff',color:'#6b7f78',border:'1px solid #cfdbd5',borderRadius:8,padding:'10px',cursor:'pointer',fontFamily:FONT}}>✕</button>
              </div>
              {invError && <div style={{color:'#b3261e',fontSize:12,marginTop:7}}>⚠ {invError}</div>}
            </form>
          )}
        </div>

      </div>
    </div>
  );
}

// ============================================================================
// AUTH GATE — wraps everything; decides what to render
// ============================================================================
function AuthGate(){
  const [stage,     setStage]     = useState('loading'); // loading|unauth|select|ready|offline
  const [user,      setUser]      = useState(null);
  const [companyId, setCompanyId] = useState(null);
  const [ownerId,   setOwnerId]   = useState(null);  // may differ from user.uid for shared companies
  const [userRole,  setUserRole]  = useState('owner'); // owner|admin|limited|viewer

  useEffect(() => {
    if(!FB_CONFIGURED || !fbAuth){
      setStage('offline');
      return;
    }
    const unsub = fbAuth.onAuthStateChanged(u => {
      if(u){ setUser(u); setStage('select'); }
      else { setUser(null); setCompanyId(null); setOwnerId(null); setStage('unauth'); }
    });
    return unsub;
  }, []);

  const handleSignOut = async () => {
    try { await fbAuth.signOut(); } catch(e){}
    setUser(null); setCompanyId(null); setOwnerId(null); setUserRole('owner'); setStage('unauth');
  };

  // onSelect now receives (companyId, ownerId, role)
  const handleSelect = (cId, oId, role) => {
    setCompanyId(cId);
    setOwnerId(oId || user?.uid);
    setUserRole(role || 'owner');
    setStage('ready');
  };

  if(stage==='loading') return (
    <div style={{minHeight:'100vh',width:'100vw',display:'flex',flexDirection:'column',
      alignItems:'center',justifyContent:'center',gap:18,
      background:'linear-gradient(145deg,#0b6b4f 0%,#063d2d 55%,#021a12 100%)',
      fontFamily:'"Inter",-apple-system,sans-serif'}}>
      <div style={{width:40,height:40,border:'3px solid rgba(255,255,255,.25)',borderTopColor:'#fff',
        borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
      <div style={{color:'rgba(255,255,255,.8)',fontSize:14}}>Loading MiyeeBooks…</div>
    </div>
  );
  if(stage==='unauth')  return <LoginScreen onLogin={u=>{ setUser(u); setStage('select'); }} />;
  if(stage==='select')  return (
    <CompanySelector user={user} onSelect={handleSelect} onSignOut={handleSignOut} />
  );
  if(stage==='offline') return <App />;
  return <App user={user} companyId={companyId} ownerId={ownerId||user?.uid}
    userRole={userRole} onSignOut={handleSignOut}
    onSwitchCompany={()=>{ setCompanyId(null); setOwnerId(null); setUserRole('owner'); setStage('select'); }} />;
}

// ============================================================================
function App({ user=null, companyId=null, ownerId=null, userRole='owner', onSignOut=null, onSwitchCompany=null }){
  const [data, setData] = useState(() => {
    const saved = loadData();
    if(saved){
      // Migrate: ensure TDS sections have ledgerId (older saves may lack it)
      const sectionMap = {};
      SEED_TDS_SECTIONS.forEach(s => { sectionMap[s.section+'|'+s.name] = s.ledgerId; });
      if(saved.tdsSections){
        saved.tdsSections = saved.tdsSections.map(s => ({
          ...s,
          ledgerId: s.ledgerId || sectionMap[s.section+'|'+s.name] || '1313',
          oldSection: s.oldSection || s.section,
        }));
      }
      // Migrate: ensure inventory fields exist
      if(!saved.stockItems) saved.stockItems = [];
      if(!saved.boms) saved.boms = [];
      if(!saved.productionOrders) saved.productionOrders = [];
      // Migrate: ensure modules config exists (preserve existing true for legacy installs)
      if(!saved.company.modules) {
        saved.company.modules = { gst:true, tds:true, payroll:true, factory:false, trader:false, service:false };
      } else {
        const dm = DEFAULT_COMPANY.modules;
        saved.company.modules = { ...dm, ...saved.company.modules };
      }
      return saved;
    }
    return {
      company: DEFAULT_COMPANY,
      coa: SEED_COA,
      parties: SEED_PARTIES,
      vouchers: [],
      forexRates: FOREX_RATES,
      gstr2bData: [],
      employees: [],
      payrollRuns: [],
      tdsSections: SEED_TDS_SECTIONS,
      stockItems: [],
      boms: [],
      productionOrders: [],
    };
  });
  const [page, setPage] = useState('dashboard');
  const [toast, setToast] = useState(null);

  // Quick-create handlers from VoucherModal (avoids prop-drilling setData)
  useEffect(() => {
    const addAcc = (e) => setData(prev => ({...prev, coa: [...prev.coa, e.detail]}));
    const addParty = (e) => setData(prev => ({...prev, parties: [...prev.parties, e.detail]}));
    window.addEventListener('miyeebooks-add-account', addAcc);
    window.addEventListener('miyeebooks-add-party', addParty);
    return () => {
      window.removeEventListener('miyeebooks-add-account', addAcc);
      window.removeEventListener('miyeebooks-add-party', addParty);
    };
  }, []);

  // ── Cloud sync ─────────────────────────────────────────────────────────────
  const [syncStatus, setSyncStatus] = useState('local'); // local|syncing|saved|error
  const saveTimerRef = useRef(null);
  const justLoaded   = useRef(false);   // flag: skip auto-save right after Firestore load

  // viewer/limited = read-only setData (viewers can't modify data)
  const isViewer   = userRole === 'viewer';
  const canWrite   = !isViewer;
  const safeSetData = canWrite ? setData : () => {};

  // On login/company switch → load from Firestore (overwrites local state)
  // Uses ownerId (may differ from user.uid for shared companies)
  const effectiveOwner = ownerId || user?.uid;
  useEffect(() => {
    if(!user || !companyId) return;
    setSyncStatus('syncing');
    fbLoadCompany(effectiveOwner, companyId).then(cloudData => {
      if(cloudData){
        // Apply same migrations as local load
        if(!cloudData.stockItems)        cloudData.stockItems = [];
        if(!cloudData.boms)              cloudData.boms = [];
        if(!cloudData.productionOrders)  cloudData.productionOrders = [];
        if(!cloudData.tdsSections)       cloudData.tdsSections = SEED_TDS_SECTIONS;
        if(!cloudData.company.modules){
          cloudData.company.modules = { gst:true, tds:true, payroll:true, factory:false, trader:false, service:false };
        } else {
          cloudData.company.modules = { ...DEFAULT_COMPANY.modules, ...cloudData.company.modules };
        }
        justLoaded.current = true;
        setData(cloudData);
        saveData(cloudData);    // warm-up localStorage cache
      }
      setSyncStatus('saved');
    }).catch(() => setSyncStatus('error'));
  }, [user?.uid, companyId, effectiveOwner]);

  // On any data change → save to localStorage immediately, then debounce Firestore save
  // Viewers cannot save (read-only)
  useEffect(() => {
    saveData(data);
    if(!user || !companyId || isViewer) return;
    if(justLoaded.current){ justLoaded.current = false; return; }
    setSyncStatus('syncing');
    if(saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      try {
        await fbSaveCompany(effectiveOwner, companyId, data);
        setSyncStatus('saved');
      } catch(e){
        setSyncStatus('error');
      }
    }, 2000);
    return () => { if(saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [data]);
  // ───────────────────────────────────────────────────────────────────────────

  // Redirect to dashboard when the current page belongs to a now-disabled module
  useEffect(() => {
    const m = data.company.modules || {};
    const gstPages    = ['gstr1','gstr3b','gstr2b'];
    const payrollPages = ['hr_employees','hr_payroll','hr_payslips'];
    const tdsPages    = ['tds_sections','tds_report'];

  const showToast = (msg, type='success') => {

  // ----- Derived: ledger balances --------------------------------------------
  const ledgerBalances = useMemo(() => {
    const bal = {};
    data.coa.forEach(a => { bal[a.id] = a.opening || 0; });
    data.vouchers.forEach(v => {

        bal[l.accountId] = (bal[l.accountId] || 0) + (l.debit || 0) - (l.credit || 0);

    });
    return bal;

  const mod = data.company.modules || {};
  const hasInventory = mod.factory || mod.trader;
  const invItems = [

  const nav = [

      {id:'help', label:'Help & Guide', ico:'?'},

  ];

  return (

          <span className="brand-mark">Miyee<span className="dot">·</span>Books</span>
          <span className="brand-tag">MSME Accounting Suite</span>
        </div>
        <div className="topbar-right">
          <span className="pill">FY {data.company.fyStart?.slice(0,4)}–{data.company.fyEnd?.slice(2,4)}</span>
          <span>{data.company.name}</span>
          {data.company.gstin && <><span style={{color:'#5a7068'}}>•</span><span>GSTIN: {data.company.gstin}</span></>}
          {user && (<>
            <span style={{color:'#5a7068'}}>•</span>
            {syncStatus==='syncing' && <span className="sync-pill syncing" title="Saving to cloud…">☁ Saving…</span>}
            {syncStatus==='saved'   && <span className="sync-pill saved"   title="All changes saved to cloud">☁ Saved</span>}

function Dashboard({data, balances, setPage}){
  const stats = useMemo(() => {
    let income = 0, expense = 0, assets = 0, liab = 0;
    let cash = 0, bank = 0, debtors = 0, creditors = 0;
    let gstPay = 0, gstInput = 0;
    data.coa.forEach(a => {
      const b = balances[a.id] || 0;
      if(a.type === 'Income') income += -b;
      if(a.type === 'Expense') expense += b;
      if(a.type === 'Asset' && !a.contra) assets += b;
      if(a.type === 'Liability') liab += -b;
      if(a.name.toLowerCase().includes('cash in hand')) cash += b;
      if(a.isBank) bank += b;
      if(a.id === '2400') debtors += b;
      if(a.id === '1300') creditors += -b;
      if(['1310','1311','1312'].includes(a.id)) gstPay += -b;
      if(['2600','2601','2602'].includes(a.id)) gstInput += b;
    });
    return {income, expense, profit:income-expense, assets, liab, cash, bank, debtors, creditors, gstPay, gstInput, netGst:gstPay-gstInput};
  }, [data.coa, balances]);

  const recentVouchers = [...(data.vouchers||[])].sort((a,b) => b.date.localeCompare(a.date)).slice(0,5);

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Welcome back</h1>
          <div className="page-sub">Your financial pulse · {data.company.name}</div>
        </div>
        <div className="page-actions">
          <button className="btn" onClick={() => setPage('vouchers')}>View Vouchers</button>
          <button className="btn btn-primary" onClick={() => setPage('vouchers')}>+ New Entry</button>
        </div>
      </div>

      <div className="stat-grid">
        <div className="stat">
          <div className="stat-label">Revenue (YTD)</div>
          <div className="stat-value rupee">₹{fmt(stats.income)}</div>
          <div className="stat-delta">From all sales accounts</div>
        </div>
        <div className="stat">
          <div className="stat-label">Total Expenses</div>
          <div className="stat-value rupee">₹{fmt(stats.expense)}</div>
          <div className="stat-delta">Operating + finance</div>
        </div>
        <div className={'stat ' + (stats.profit>=0?'':'stat-danger')}>
          <div className="stat-label">Net Profit / (Loss)</div>
          <div className={'stat-value rupee ' + (stats.profit<0?'neg':'pos')}>₹{fmt(stats.profit)}</div>
          <div className={'stat-delta ' + (stats.profit>=0?'up':'down')}>
            Margin: {stats.income? ((stats.profit/stats.income)*100).toFixed(1) : '0.0'}%
          </div>
        </div>
        <div className="stat stat-gold">
          <div className="stat-label">Cash + Bank</div>
          <div className="stat-value rupee">₹{fmt(stats.cash + stats.bank)}</div>
          <div className="stat-delta">Liquid position</div>
        </div>
        <div className="stat stat-info">
          <div className="stat-label">Trade Receivables</div>
          <div className="stat-value rupee">₹{fmt(stats.debtors)}</div>
          <div className="stat-delta">From customers</div>
        </div>
        <div className="stat stat-info">
          <div className="stat-label">Trade Payables</div>
          <div className="stat-value rupee">₹{fmt(stats.creditors)}</div>
          <div className="stat-delta">To vendors</div>
        </div>
        <div className="stat stat-gold">
          <div className="stat-label">GST Net Payable</div>
          <div className="stat-value rupee">₹{fmt(stats.netGst)}</div>
          <div className="stat-delta">Output − Input ITC</div>
        </div>
        <div className="stat">
          <div className="stat-label">Total Vouchers</div>
          <div className="stat-value rupee">{data.vouchers.length}</div>
          <div className="stat-delta">Entries posted</div>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:18}}>
        <div className="card">
          <div className="card-head">
            <h3 className="card-title">Recent Vouchers</h3>
            <button className="btn btn-sm btn-ghost" onClick={() => setPage('daybook')}>Open Day Book →</button>
          </div>

            {recentVouchers.length === 0 ? (
              <div className="empty">
                <div className="empty-ico">◌</div>
                <div>No vouchers yet. Start by adding your first entry.</div>
                <button className="btn btn-primary" style={{marginTop:14}} onClick={() => setPage('vouchers')}>+ Create Voucher</button>
              </div>

                      <td>{v.narration||'—'}</td>

          </div>
        </div>
      </div>

}

function CsvImportModal({ title, sampleHeaders, sampleRows, sampleFilename, onImport, onClose }) {
  const [rows, setRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [error, setError] = useState('');
  const [imported, setImported] = useState(0);
  const [done, setDone] = useState(false);

  const handleDownloadSample = () => {
    const header = sampleHeaders.join(',');
    const sample = sampleRows.map(r => sampleHeaders.map(h => (r[h]||'')).join(',')).join('\n');
    downloadCSV(sampleFilename, header + '\n' + sample);
  };

  const handleFile = (e) => {
    const file = e.target.files[0]; if(!file) return;
    setError(''); setRows([]); setHeaders([]); setDone(false);
    const reader = new FileReader();
    reader.onload = (ev) => {
      const { headers: h, rows: r } = parseCSV(ev.target.result);
      if(r.length === 0){ setError('No data rows found in CSV.'); return; }
      const missing = sampleHeaders.slice(0,2).filter(req => !h.includes(req));
      if(missing.length){ setError('Missing required columns: ' + missing.join(', ')); return; }
      setHeaders(h); setRows(r);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const handleImport = () => {
    const result = onImport(rows);
    if(result.error){ setError(result.error); return; }
    setImported(result.count);
    setDone(true);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal wide" onClick={e => e.stopPropagation()} style={{maxWidth:780}}>
        <div className="modal-head">
          <h2 className="modal-title">📥 {title}</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{background:'var(--surface-2)',borderRadius:10,padding:'14px 18px',marginBottom:16,border:'1px solid var(--line)'}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:5}}>Step 1 — Download the sample template</div>
            <div style={{fontSize:12,color:'var(--ink-3)',marginBottom:10}}>Fill in your data and save as CSV. Do not rename the column headers.</div>
            <button className="btn btn-sm" onClick={handleDownloadSample}>⬇ Download Sample CSV Template</button>
          </div>
          <div style={{background:'var(--surface-2)',borderRadius:10,padding:'14px 18px',marginBottom:16,border:'1px solid var(--line)'}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:5}}>Step 2 — Upload your filled CSV</div>
            <input type="file" accept=".csv,text/csv" onChange={handleFile} style={{fontSize:13}} />
          </div>
          {rows.length > 0 && !done && (
            <div style={{marginBottom:16}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>Preview — {rows.length} row{rows.length>1?'s':''} ready to import</div>
              <div style={{overflowX:'auto',maxHeight:220,border:'1px solid var(--line)',borderRadius:8}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                  <thead><tr style={{background:'var(--surface-2)'}}>
                    {headers.map(h => <th key={h} style={{padding:'6px 10px',textAlign:'left',borderBottom:'1px solid var(--line)',whiteSpace:'nowrap'}}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {rows.slice(0,10).map((r,i) => (
                      <tr key={i} style={{borderBottom:'1px solid var(--line-2)'}}>
                        {headers.map(h => <td key={h} style={{padding:'5px 10px',whiteSpace:'nowrap',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis'}}>{r[h]}</td>)}
                      </tr>
                    ))}
                    {rows.length > 10 && <tr><td colSpan={headers.length} style={{padding:'6px 10px',color:'var(--ink-3)',textAlign:'center'}}>…and {rows.length-10} more rows</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          )}
          {error && <div style={{background:'var(--danger-soft)',color:'var(--danger)',borderRadius:8,padding:'10px 14px',fontSize:12,marginBottom:12}}>⚠ {error}</div>}
          {done && <div style={{background:'var(--success-soft)',color:'var(--success)',borderRadius:8,padding:'10px 14px',fontSize:12,marginBottom:12}}>✓ Successfully imported {imported} record{imported!==1?'s':''}.</div>}
        </div>
        <div className="modal-foot">
          {done ? (
            <button className="btn btn-primary" onClick={onClose}>✓ Close</button>
          ) : (<>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={handleImport} disabled={rows.length===0}>
              ↑ Import {rows.length > 0 ? rows.length + ' Rows' : ''}
            </button>
          </>)}
        </div>
      </div>
    </div>
  );
}

function InviteModal({ ownerId, companyId, companyName, onClose }) {
  const [role, setRole] = useState('limited');
  const [code, setCode] = useState('');
  const [loading, setLoading] = useState(false);
  const [copied, setCopied] = useState(false);
  const FONT = '"Inter",-apple-system,BlinkMacSystemFont,sans-serif';

  const ROLES = [
    { value:'admin',   label:'Admin',          desc:'Full access — vouchers, COA, employees, settings (cannot delete company or manage members)' },
    { value:'limited', label:'Limited',         desc:'Can post vouchers and view reports; cannot change master data or settings' },
    { value:'viewer',  label:'Viewer / Auditor',desc:'Read-only — view all data but cannot make any changes' },
  ];

  const handleGenerate = async () => {
    setLoading(true);
    try { const c = await fbCreateInvite(ownerId, companyId, companyName, role); setCode(c); }
    catch(e){ alert('Failed to create invite: ' + e.message); }
    finally { setLoading(false); }
  };

  const copyCode = () => {
    const link = `${location.origin}${location.pathname}#invite=${code}`;
    navigator.clipboard.writeText(link).catch(() => navigator.clipboard.writeText(code));
    setCopied(true); setTimeout(() => setCopied(false), 2000);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,fontFamily:FONT}}>
      <div style={{background:'#fff',borderRadius:16,padding:'28px 28px 22px',maxWidth:460,width:'90%',boxShadow:'0 24px 80px rgba(0,0,0,.3)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:16,color:'#0e2a23'}}>🔗 Invite Team Member</div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:'#6b7f78',lineHeight:1}}>✕</button>
        </div>
        <div style={{fontSize:12,color:'#6b7f78',marginBottom:18}}>Sharing: <b style={{color:'#0e2a23'}}>{companyName}</b></div>
        {!code ? (<>
          <div style={{fontSize:12,fontWeight:600,color:'#3a4f49',marginBottom:8}}>Select Access Level</div>
          {ROLES.map(r => (
            <label key={r.value} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',border:`1.5px solid ${role===r.value?'#0b6b4f':'#e3ebe7'}`,borderRadius:8,cursor:'pointer',marginBottom:7,background:role===r.value?'#e6f3ee':'#fff'}}>
              <input type="radio" name="invRole" value={r.value} checked={role===r.value} onChange={() => setRole(r.value)} style={{marginTop:3}} />
              <div>
                <div style={{fontSize:13,fontWeight:600,color:'#0e2a23'}}>{r.label}</div>
                <div style={{fontSize:11,color:'#6b7f78',marginTop:2}}>{r.desc}</div>
              </div>
            </label>
          ))}
          <button onClick={handleGenerate} disabled={loading}
            style={{width:'100%',background:loading?'#8fb5a8':'#0b6b4f',color:'#fff',border:'none',borderRadius:9,padding:'12px',fontSize:13,fontWeight:600,cursor:loading?'not-allowed':'pointer',marginTop:6,fontFamily:FONT}}>
            {loading ? 'Generating…' : '✓ Generate Invite Code'}
          </button>
        </>) : (<>
          <div style={{background:'#f9fbf9',borderRadius:10,padding:'14px 16px',border:'1px solid #e3ebe7',marginBottom:12,textAlign:'center'}}>
            <div style={{fontSize:11,color:'#6b7f78',marginBottom:6}}>Invite Code (valid 7 days)</div>
            <div style={{fontFamily:'monospace',fontSize:26,fontWeight:700,color:'#0b6b4f',letterSpacing:4}}>{code}</div>
          </div>
          <div style={{fontSize:11,color:'#6b7f78',marginBottom:14}}>Share this code with your team member. They enter it via <b>"Have an invite code?"</b> on the company selection screen.</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={copyCode} style={{flex:1,background:copied?'#0b6b4f':'#fff',color:copied?'#fff':'#0b6b4f',border:'1.5px solid #0b6b4f',borderRadius:8,padding:'10px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:FONT}}>
              {copied ? '✓ Copied!' : '📋 Copy Link'}
            </button>
            <button onClick={onClose} style={{flex:1,background:'#0b6b4f',color:'#fff',border:'none',borderRadius:8,padding:'10px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:FONT}}>Done</button>
          </div>
        </>)}
      </div>
    </div>
  );
}

function ChartOfAccounts({data, setData, balances, showToast, readOnly=false}){
  const [editing, setEditing] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [filter, setFilter] = useState('All');
  const [search, setSearch] = useState('');

  const types = ['All','Asset','Liability','Equity','Income','Expense'];

  const COA_SAMPLE_HEADERS = ['code','name','type','group','schedule','opening','hsn','gstRate'];
  const COA_SAMPLE_ROWS = [
    {code:'5000',name:'Marketing Expenses',type:'Expense',group:'Other Expenses',schedule:'Other Expenses',opening:'0',hsn:'',gstRate:'18'},
    {code:'5010',name:'Software Subscriptions',type:'Expense',group:'Other Expenses',schedule:'Other Expenses',opening:'0',hsn:'',gstRate:'18'},
    {code:'2650',name:'Advances to Suppliers',type:'Asset',group:'Current Assets',schedule:'Other Current Assets',opening:'50000',hsn:'',gstRate:''},
    {code:'3150',name:'Other Operating Revenue',type:'Income',group:'Revenue from Operations',schedule:'Revenue',opening:'0',hsn:'',gstRate:'18'},
  ];

  const defaultGroup = (type) => {
    if(type==='Asset')     return 'Current Assets';
    if(type==='Liability') return 'Current Liabilities';
    if(type==='Equity')    return 'Shareholders Funds';
    if(type==='Income')    return 'Revenue from Operations';
    return 'Other Expenses';
  };

  const handleImportCOA = (rows) => {
    const validTypes = ['Asset','Liability','Equity','Income','Expense'];
    const imported = [];
    const errors   = [];
    rows.forEach((r, i) => {
      const code = r['code']?.trim();
      const name = r['name']?.trim();
      const type = r['type']?.trim();
      if(!code || !name){ errors.push(`Row ${i+2}: code and name are required`); return; }
      if(!validTypes.includes(type)){ errors.push(`Row ${i+2}: type must be one of ${validTypes.join(', ')}`); return; }
      if(data.coa.find(a => a.id === code)) return; // skip existing
      imported.push({
        id:       code,
        name,
        type,
        group:    r['group']?.trim()    || defaultGroup(type),
        schedule: r['schedule']?.trim() || '',
        opening:  parseFloat(r['opening']) || 0,
        hsn:      r['hsn']?.trim()      || '',
        gstRate:  parseFloat(r['gstRate']) || 0,
      });
    });
    if(errors.length > 0 && imported.length === 0)
      return { count:0, error: errors.slice(0,3).join('; ') };
    setData(prev => ({...prev, coa: [...prev.coa, ...imported]}));
    showToast('Imported ' + imported.length + ' accounts' + (errors.length?' ('+errors.length+' skipped)':''));
    return { count: imported.length };
  };

  const filtered = data.coa.filter(a => {
    if(filter !== 'All' && a.type !== filter) return false;
    if(search && !a.name.toLowerCase().includes(search.toLowerCase()) && !a.id.includes(search)) return false;
    return true;
  });

  const grouped = filtered.reduce((acc, a) => {
    if(!acc[a.group]) acc[a.group] = [];
    acc[a.group].push(a);
    return acc;
  }, {});

  const handleSave = (acc) => {
    if(editing){
      setData({...data, coa: data.coa.map(a => a.id === editing.id ? {...a, ...acc} : a)});
      showToast('Account updated');
    } else {
      if(data.coa.find(a => a.id === acc.id)){
        showToast('Account code already exists', 'error');
        return;
      }
      setData({...data, coa: [...data.coa, acc]});
      showToast('Account created');
    }
    setShowModal(false);
    setEditing(null);
  };

  const handleDelete = (acc) => {
    if(!confirm('Delete account "' + acc.name + '"?')) return;
    const used = data.vouchers.some(v => (v.lines||[]).some(l => l.accountId === acc.id));
    if(used){ showToast('Account is used in vouchers — cannot delete', 'error'); return; }
    setData({...data, coa: data.coa.filter(a => a.id !== acc.id)});
    showToast('Account deleted');
  };

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Chart of Accounts</h1>
          <div className="page-sub">Schedule III aligned ledger master · {data.coa.length} accounts</div>
        </div>
        {!readOnly && <div className="page-actions">
          <button className="btn" onClick={() => setShowImport(true)}>⬆ Import CSV</button>
          <button className="btn btn-primary" onClick={() => { setEditing(null); setShowModal(true); }}>+ New Account</button>
        </div>}
      </div>

      <div className="filter-bar">
        <div className="field">
          <label>Search</label>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Code or name..." style={{minWidth:200}} />
        </div>
        <div className="field">
          <label>Type</label>
          <select value={filter} onChange={e => setFilter(e.target.value)}>
            {types.map(t => <option key={t}>{t}</option>)}
          </select>
        </div>
      </div>

      <div className="table-wrap">
        <table>
          <thead>
            <tr>
              <th style={{width:80}}>Code</th>
              <th>Account Name</th>
              <th>Type</th>
              <th>Schedule III Head</th>
              <th className="num">Opening</th>
              <th className="num">Current Balance</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {Object.keys(grouped).map(g => (
              <React.Fragment key={g}>
                <tr className="group"><td colSpan="7">{g}</td></tr>
                {grouped[g].map(a => {
                  const bal = balances[a.id] || 0;
                  const displayBal = (a.type==='Liability'||a.type==='Equity'||a.type==='Income') ? -bal : bal;
                  return (
                    <tr key={a.id}>
                      <td style={{fontFamily:'var(--mono)', fontWeight:600}}>{a.id}</td>
                      <td>{a.name}{a.contra && <span className="badge badge-muted" style={{marginLeft:6}}>Contra</span>}{a.isBank && <span className="badge badge-info" style={{marginLeft:6}}>Bank</span>}{a.gstRate>0 && <span className="badge badge-gold" style={{marginLeft:6}}>GST {a.gstRate}%</span>}</td>
                      <td><span className="badge badge-success">{a.type}</span></td>
                      <td style={{color:'var(--ink-3)', fontSize:11}}>{a.schedule}</td>
                      <td className="num">₹{fmt(a.opening||0)}</td>
                      <td className="num bold">₹{fmt(displayBal)}</td>
                      <td className="actions">
                        {!readOnly && <button className="btn btn-sm btn-ghost" onClick={() => { setEditing(a); setShowModal(true); }}>Edit</button>}
                        {!readOnly && <button className="btn btn-sm btn-danger" onClick={() => handleDelete(a)}>×</button>}
                      </td>
                    </tr>
                  );
                })}
              </React.Fragment>
            ))}
          </tbody>
        </table>
      </div>

      {showModal && <AccountModal account={editing} onSave={handleSave} onClose={() => { setShowModal(false); setEditing(null); }} />}
      {showImport && <CsvImportModal title="Import Chart of Accounts" sampleHeaders={COA_SAMPLE_HEADERS} sampleRows={COA_SAMPLE_ROWS} sampleFilename="coa_import_template.csv" onImport={handleImportCOA} onClose={() => setShowImport(false)} />}
    </>
  );
}

function AccountModal({account, onSave, onClose}){
  const [f, setF] = useState(account || {
    id:'', name:'', group:'Current Assets', type:'Asset', schedule:'Other Current Assets', opening:0, gstRate:0
  });

  const groupsByType = {
    Asset:['Fixed Assets','Non-Current Investments','Current Assets'],
    Liability:['Non-Current Liabilities','Current Liabilities'],
    Equity:['Shareholders Funds'],
    Income:['Revenue from Operations','Other Income'],
    Expense:['Cost of Materials','Purchase of Stock-in-Trade','Employee Benefit Expenses','Finance Costs','Depreciation','Other Expenses'],
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2 className="modal-title">{account ? 'Edit Account' : 'New Account'}</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="field required">
              <label>Account Code</label>
              <input value={f.id} onChange={e => setF({...f, id:e.target.value})} disabled={!!account} placeholder="e.g. 4570" />
            </div>
            <div className="field required">
