<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b6b4f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#094f3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Decorative accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#c9a227" />

  <!-- Logo badge -->
  <rect x="80" y="80" width="100" height="100" rx="22" fill="rgba(255,255,255,0.12)" />
  <text x="130" y="153" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle">M</text>
  <circle cx="168" cy="96" r="12" fill="#c9a227" />

  <!-- Brand name -->
  <text x="80" y="254" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff">Miyee</text>
  <text x="80" y="254" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#c9a227" dx="260">·</text>
  <text x="80" y="254" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" dx="296">Books</text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.75)" letter-spacing="2">MSME ACCOUNTING SUITE</text>

  <!-- Divider -->
  <rect x="80" y="342" width="120" height="3" rx="2" fill="#c9a227" />

  <!-- Feature pills -->
  <rect x="80" y="376" width="130" height="38" rx="19" fill="rgba(255,255,255,0.12)" />
  <text x="145" y="400" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">GST Filing</text>

  <rect x="224" y="376" width="130" height="38" rx="19" fill="rgba(255,255,255,0.12)" />
  <text x="289" y="400" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">TDS Module</text>

  <rect x="368" y="376" width="130" height="38" rx="19" fill="rgba(255,255,255,0.12)" />
  <text x="433" y="400" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Payroll</text>

  <rect x="512" y="376" width="155" height="38" rx="19" fill="rgba(255,255,255,0.12)" />
  <text x="589" y="400" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Inventory</text>

  <rect x="681" y="376" width="180" height="38" rx="19" fill="rgba(255,255,255,0.12)" />
  <text x="771" y="400" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Factory / BOM</text>

  <!-- Sub-features list -->
  <text x="80" y="468" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)">✓ Double-Entry Accounting  ✓ GSTR-1 / GSTR-3B  ✓ P&amp;L · Balance Sheet  ✓ Single HTML File</text>

  <!-- Bottom strip -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.25)" />
  <text x="80" y="604" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.55)">Built by Vipin Nair · MYeeCFO Series · Free for MSMEs</text>
  <text x="1120" y="604" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)" text-anchor="end">vipinnairv.github.io/MiyeeBooks</text>

  <!-- Decorative right-side illustration — ledger lines -->
  <g opacity="0.06">
    <rect x="900" y="100" width="240" height="18" rx="4" fill="#ffffff"/>
    <rect x="900" y="132" width="180" height="14" rx="4" fill="#ffffff"/>
    <rect x="900" y="160" width="210" height="14" rx="4" fill="#ffffff"/>
    <rect x="900" y="188" width="150" height="14" rx="4" fill="#ffffff"/>
    <rect x="900" y="216" width="200" height="14" rx="4" fill="#ffffff"/>
    <rect x="900" y="244" width="170" height="14" rx="4" fill="#ffffff"/>
    <rect x="900" y="272" width="220" height="18" rx="4" fill="#c9a227"/>
  </g>
</svg>
